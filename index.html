<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品设计部管理看板</title>
    <script src="./data/dashboard-data.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --topbar: #0e9f6e;
            --topbar-alt: #0a8d61;
            --accent: #12b57a;
            --accent-light: #e6f9f0;
            --text: #243447;
            --text-secondary: #5a6c7d;
            --muted: #7d8b99;
            --border: #d8e0e8;
            --line: #e8f0f7;
            --error: #f74338;
            --warning: #ff9d00;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.12);
            --radius: 8px;
            --radius-lg: 12px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            font-size: 14px;
        }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(135deg, var(--topbar) 0%, var(--topbar-alt) 100%);
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .sidebar-content {
            flex: 1;
            padding: 8px 0;
            overflow-y: auto;
        }

        .nav-level-1-title {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            background: var(--line);
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .nav-level-1-title.expanded {
            background: rgba(13,148,136,0.08);
            color: var(--accent-strong);
        }

        .nav-level-1-title.active-trail {
            border-left-color: rgba(13, 148, 136, 0.55);
            background: linear-gradient(90deg, rgba(13,148,136,0.14), rgba(13,148,136,0.03));
            color: var(--accent-strong);
        }

        .nav-level-1-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .nav-level-1-title.expanded + .nav-level-1-container {
            max-height: 1600px;
        }

        .nav-level-2-title {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            padding-left: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 13px;
            gap: 6px;
        }

        .nav-level-2-title:hover {
            background: var(--line);
            color: var(--text);
        }

        .nav-level-2-title.expanded {
            color: #335166;
            background: rgba(13,148,136,0.05);
        }

        .nav-level-2-title.active,
        .nav-item.active,
        .nav-subitem.active {
            border-left-color: var(--accent);
            background: linear-gradient(90deg, rgba(13,148,136,0.20), rgba(13,148,136,0.04));
            color: var(--accent-strong);
            font-weight: 700;
            box-shadow: inset 0 0 0 1px rgba(13,148,136,0.10);
        }

        .nav-level-2-title.active {
            padding-left: 25px;
        }

        .nav-level-2-title.active-trail,
        .nav-folder-title.active-trail {
            color: #29546b;
            background: rgba(13,148,136,0.06);
            border-left-color: rgba(13,148,136,0.26);
        }

        .nav-level-2-title.nav-standalone {
            justify-content: flex-start;
        }

        .nav-level-2-toggle-placeholder {
            visibility: hidden;
        }

        .nav-level-2-toggle {
            display: inline-block;
            width: 14px;
            height: 14px;
            font-size: 10px;
            transition: transform 0.2s ease;
        }

        .nav-level-2-title.expanded .nav-level-2-toggle {
            transform: rotate(90deg);
        }

        .nav-level-3-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .nav-level-2-title.expanded + .nav-level-3-container {
            max-height: 800px;
        }

        .nav-item,
        .nav-subitem {
            display: block;
            padding: 8px 16px;
            padding-left: 44px;
            color: var(--text-secondary);
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
            user-select: none;
            font-size: 12px;
        }

        .nav-subitem {
            padding-left: 62px;
        }

        .nav-item:hover,
        .nav-subitem:hover {
            background-color: var(--line);
            color: var(--text);
        }

        .nav-folder-title {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            padding-left: 44px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            font-size: 12px;
            font-weight: 600;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .nav-folder-title:hover {
            background-color: var(--line);
            color: var(--text);
        }

        .nav-folder-title.expanded {
            color: #335166;
            background: rgba(13,148,136,0.04);
        }

        .nav-folder-toggle {
            display: inline-block;
            width: 14px;
            height: 14px;
            font-size: 10px;
            transition: transform 0.2s ease;
        }

        .nav-folder-title.expanded .nav-folder-toggle {
            transform: rotate(90deg);
        }

        .nav-folder-children {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .nav-folder-title.expanded + .nav-folder-children {
            max-height: 500px;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: linear-gradient(135deg, var(--topbar) 0%, var(--topbar-alt) 100%);
            color: white;
            padding: 16px 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 700;
        }

        .topbar-subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        .topbar-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            backdrop-filter: blur(12px);
            text-align: right;
        }

        .topbar-meta-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.72);
        }

        .topbar-meta-value {
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        body.public-single-page .app-container {
            display: block;
            min-height: 100vh;
            height: auto;
            overflow: visible;
        }

        body.public-single-page .sidebar {
            display: none;
        }

        body.public-single-page .main-content {
            min-height: 100vh;
            overflow: visible;
        }

        body.public-single-page .topbar {
            height: auto;
            min-height: 88px;
            padding: 18px 32px;
        }

        body.public-single-page .page-content {
            width: min(1600px, 100%);
            margin: 0 auto;
            padding: 24px 32px 40px;
        }

        .public-member-summary {
            margin-top: 20px;
            padding: 20px 22px;
            border-radius: 22px;
            border: 1px solid #dce8e1;
            background:
                radial-gradient(circle at top right, rgba(14, 159, 110, 0.1), transparent 28%),
                linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(246,250,248,0.96) 100%);
            box-shadow: 0 14px 36px rgba(23, 91, 67, 0.08);
        }

        .public-member-summary-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .public-member-summary-kicker {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: #4c816c;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .public-member-summary-title {
            font-size: 20px;
            font-weight: 700;
            color: #1c4032;
        }

        .public-member-summary-subtitle {
            margin-top: 6px;
            font-size: 13px;
            color: #5b7366;
        }

        .public-member-summary-meta {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(14, 159, 110, 0.08);
            border: 1px solid rgba(14, 159, 110, 0.14);
            color: #1f6b4d;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .public-member-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
        }

        .public-member-summary-card {
            padding: 16px 16px 14px;
            border-radius: 18px;
            border: 1px solid rgba(191, 212, 201, 0.78);
            background: rgba(255,255,255,0.9);
        }

        .public-member-summary-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #7a8f85;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .public-member-summary-value {
            font-size: 24px;
            line-height: 1.05;
            font-weight: 800;
            color: #1d3e32;
            margin-bottom: 6px;
        }

        .public-member-summary-note {
            font-size: 12px;
            color: #5b7366;
            line-height: 1.6;
        }

        .embedded-page-shell {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: calc(100vh - 170px);
        }

        .embedded-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 22px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(245,249,248,0.98) 100%);
        }

        .embedded-page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }

        .embedded-page-subtitle {
            margin-top: 4px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .embedded-page-hint {
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: #f3faf7;
            border: 1px solid #d8eee3;
            color: #38614d;
            font-size: 12px;
        }

        .embedded-page-hint code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background: rgba(255,255,255,0.9);
            padding: 2px 6px;
            border-radius: 6px;
            color: #214634;
        }

        .embedded-page-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .okr-preview-shell {
            display: grid;
            gap: 18px;
        }

        .okr-preview-hero {
            position: relative;
            overflow: hidden;
            padding: 24px 26px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.16), transparent 26%),
                linear-gradient(135deg, #0b3b66 0%, #0f766e 55%, #19b58f 100%);
            box-shadow: 0 28px 70px rgba(11, 59, 102, 0.18);
            color: #ffffff;
        }

        .okr-preview-hero::after {
            content: "";
            position: absolute;
            right: -72px;
            bottom: -96px;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            filter: blur(10px);
        }

        .okr-preview-hero-inner {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            align-items: start;
        }

        .okr-preview-kicker {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: rgba(235, 251, 248, 0.78);
            margin-bottom: 10px;
        }

        .okr-preview-title {
            margin: 0;
            font-size: 34px;
            line-height: 1.05;
            letter-spacing: 0.02em;
        }

        .okr-preview-subtitle {
            margin: 12px 0 0;
            max-width: 760px;
            font-size: 14px;
            line-height: 1.7;
            color: rgba(235, 251, 248, 0.92);
        }

        .okr-preview-pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .okr-preview-pill {
            display: inline-flex;
            align-items: center;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.16);
            color: #ffffff;
            font-size: 12px;
            font-weight: 700;
        }

        .okr-preview-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
        }

        .okr-preview-actions .btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: none;
        }

        .okr-preview-actions .btn:hover {
            background: rgba(255,255,255,0.18);
        }

        .okr-preview-actions .btn-primary {
            background: #ffffff;
            color: var(--topbar-alt);
            border-color: transparent;
        }

        .okr-preview-meta-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .okr-preview-meta-card {
            padding: 16px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(247,250,252,0.94) 100%);
            box-shadow: var(--shadow);
        }

        .okr-preview-meta-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .okr-preview-meta-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
        }

        .okr-preview-meta-desc {
            margin-top: 6px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .okr-preview-note {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 16px;
        }

        .okr-preview-note-card {
            padding: 18px 20px;
            border-radius: 22px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(244,249,248,0.96) 100%);
            box-shadow: var(--shadow);
            display: grid;
            gap: 10px;
        }

        .okr-preview-note-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
        }

        .okr-preview-note-card h3 {
            margin: 0;
            font-size: 22px;
            color: var(--text);
        }

        .okr-preview-note-card p {
            margin: 0;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .okr-preview-code {
            display: block;
            padding: 10px 12px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(11,59,102,0.06), rgba(13,148,136,0.08));
            border: 1px solid rgba(13,148,136,0.14);
            color: var(--topbar-alt);
            font-size: 12px;
            line-height: 1.55;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .okr-preview-list {
            display: grid;
            gap: 8px;
        }

        .okr-preview-list-item {
            display: grid;
            grid-template-columns: 22px minmax(0, 1fr);
            gap: 10px;
            align-items: start;
            font-size: 13px;
            line-height: 1.65;
            color: var(--text-secondary);
        }

        .okr-preview-list-item strong {
            color: var(--text);
        }

        .okr-preview-list-dot {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(15,118,110,0.12);
            color: var(--topbar);
            font-size: 11px;
            font-weight: 800;
            margin-top: 1px;
        }

        .okr-preview-frame-wrap {
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,249,248,0.96));
            box-shadow: var(--shadow-lg);
        }

        .okr-preview-frame-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--line);
        }

        .okr-preview-frame-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .okr-preview-frame-subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .okr-embed-frame {
            width: 100%;
            min-height: calc(100vh - 250px);
            border: 0;
            display: block;
            background: #f5f7fb;
        }

        .filter-panel {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 28px;
            overflow-x: auto;
            background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(247,250,252,0.92) 100%);
            border: 1px solid rgba(116, 138, 163, 0.24);
            box-shadow: var(--shadow);
        }

        .filter-panel::-webkit-scrollbar {
            height: 6px;
        }

        .filter-panel::-webkit-scrollbar-thumb {
            background: rgba(112, 128, 147, 0.26);
            border-radius: 999px;
        }

        .filter-tab {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 154px;
            padding: 18px 24px;
            border: 1px solid transparent;
            border-radius: 24px;
            background: transparent;
            color: #56697d;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .filter-tab:hover {
            color: var(--text);
            background: rgba(13,148,136,0.06);
        }

        .filter-tab.active {
            color: #ffffff;
            background: linear-gradient(135deg, #16c589 0%, #16b77f 100%);
            border-color: rgba(22, 183, 127, 0.4);
            box-shadow: 0 16px 32px rgba(22, 183, 127, 0.22);
        }

        select, input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 13px;
            background: var(--surface);
            color: var(--text);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .btn {
            padding: 8px 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn:hover {
            background: var(--topbar);
        }

        /* ===== COMPONENTS ===== */
        .hero {
            background: linear-gradient(135deg, var(--topbar) 0%, var(--topbar-alt) 100%);
            color: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 24px;
            align-items: center;
        }

        .hero h2 { color: white; margin: 0; }
        .hero p { opacity: 0.95; font-size: 14px; margin: 8px 0 0 0; }

        .hero-stats {
            display: flex;
            gap: 12px;
        }

        .hero-stat {
            text-align: center;
        }

        .hero-stat-value {
            font-size: 28px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .hero-stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            background: var(--line);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid var(--line);
        }

        .table tr:hover { background: var(--bg); }

        .sheet-table-shell {
            border-radius: 22px;
            border: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(246,249,252,0.94) 100%);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sheet-table-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(13,148,136,0.06), rgba(255,255,255,0));
        }

        .sheet-table-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
        }

        .sheet-table-subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .sheet-table-meta {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(11, 59, 102, 0.06);
            border: 1px solid rgba(11, 59, 102, 0.08);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .sheet-table-scroll {
            overflow-x: auto;
            overflow-y: hidden;
        }

        .sheet-table-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .sheet-table-scroll::-webkit-scrollbar-thumb {
            background: rgba(112, 128, 147, 0.28);
            border-radius: 999px;
        }

        .sheet-data-table {
            width: 100%;
            min-width: 2280px;
            border-collapse: separate;
            border-spacing: 0;
        }

        .sheet-data-table thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            padding: 14px 16px;
            background: #f8fafc;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .sheet-data-table tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
            background: rgba(255,255,255,0.72);
        }

        .sheet-data-table tbody tr:hover td {
            background: rgba(13,148,136,0.05);
        }

        .sheet-cell-strong {
            font-weight: 700;
            color: var(--text);
        }

        .sheet-cell-muted {
            color: var(--text-secondary);
        }

        .sheet-cell-wrap {
            min-width: 0;
            white-space: normal;
            word-break: break-word;
        }

        .sheet-status-pill {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
        }

        .sheet-progress-text {
            font-weight: 700;
            color: var(--accent-strong);
            white-space: nowrap;
        }

        .sheet-empty {
            padding: 40px 24px;
            text-align: center;
            color: var(--muted);
        }

        .okr-row {
            border-bottom: 1px solid var(--line);
            padding: 16px 0;
        }

        .okr-row:last-child {
            border-bottom: none;
        }

        .okr-task {
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }

        .okr-meta {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .okr-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }

        .progress {
            flex: 1;
            height: 4px;
            background: var(--line);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--topbar) 100%);
        }

        .progress-text {
            font-weight: 600;
            font-size: 12px;
            color: var(--accent);
            min-width: 40px;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
        }

        .badge-green { background: var(--accent-light); color: var(--accent); }
        .badge-orange { background: #fff3e0; color: var(--warning); }
        .badge-red { background: #ffebee; color: var(--error); }

        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .person-header {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        .person-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--topbar) 0%, var(--topbar-alt) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 24px;
        }

        .person-info { flex: 1; }
        .person-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .person-title { font-size: 13px; color: var(--muted); margin-bottom: 8px; }

        .group-members {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .member-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .member-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow);
        }

        .member-card-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--topbar) 0%, var(--topbar-alt) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            margin: 0 auto 8px;
        }

        .member-card-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 4px;
        }

        :root {
            --bg: #f2f4f8;
            --surface: rgba(255, 255, 255, 0.92);
            --surface-strong: #ffffff;
            --topbar: #0f766e;
            --topbar-alt: #0b3b66;
            --accent: #0d9488;
            --accent-strong: #0f766e;
            --accent-light: rgba(13, 148, 136, 0.12);
            --text: #112133;
            --text-secondary: #516173;
            --muted: #708093;
            --border: rgba(116, 138, 163, 0.2);
            --line: rgba(116, 138, 163, 0.16);
            --shadow: 0 18px 40px rgba(15, 59, 102, 0.08);
            --shadow-lg: 0 26px 70px rgba(15, 59, 102, 0.14);
            --warning-bg: rgba(245, 158, 11, 0.12);
            --error-bg: rgba(239, 68, 68, 0.12);
            --success-bg: rgba(16, 185, 129, 0.12);
        }

        body {
            font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(13, 148, 136, 0.14), transparent 24%),
                radial-gradient(circle at right 20%, rgba(11, 59, 102, 0.12), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #eef4f7 100%);
        }

        .sidebar {
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,250,252,0.96) 100%);
            backdrop-filter: blur(18px);
        }

        .topbar {
            height: 82px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset;
        }

        .page-content {
            padding: 28px 32px 40px;
        }

        .filter-panel,
        .card,
        .person-header {
            background: var(--surface);
            backdrop-filter: blur(18px);
            border-color: var(--border);
            box-shadow: var(--shadow);
        }

        .hero {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 28%),
                linear-gradient(135deg, #0b3b66 0%, #0f766e 55%, #14b8a6 100%);
            box-shadow: var(--shadow-lg);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -80px -120px auto;
            width: 240px;
            height: 240px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            filter: blur(12px);
        }

        .hero-stats {
            gap: 18px;
        }

        .hero-stat {
            min-width: 84px;
            padding: 10px 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        .card-title {
            color: var(--text-secondary);
            letter-spacing: 0.08em;
        }

        .insight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .insight-card {
            padding: 16px 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(247,250,252,0.94) 100%);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .insight-eyebrow {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 10px;
        }

        .insight-value {
            font-size: 28px;
            line-height: 1;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .insight-note {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-type-distribution {
            margin-bottom: 20px;
            padding: 18px 20px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(247,250,252,0.94) 100%);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .task-type-distribution-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .task-type-distribution-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .task-type-distribution-subtitle {
            margin-top: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .task-type-distribution-meta {
            font-size: 12px;
            font-weight: 700;
            color: #5f7387;
            white-space: nowrap;
        }

        .task-type-distribution-list {
            display: grid;
            gap: 10px;
        }

        .task-type-distribution-item {
            display: grid;
            grid-template-columns: 140px minmax(0, 1fr) 72px;
            align-items: center;
            gap: 12px;
        }

        .task-type-distribution-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .task-type-distribution-bar {
            position: relative;
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(207, 220, 231, 0.72);
        }

        .task-type-distribution-fill {
            position: absolute;
            inset: 0 auto 0 0;
            border-radius: 999px;
            background: linear-gradient(90deg, #0f766e 0%, #19b58f 100%);
        }

        .task-type-distribution-value {
            font-size: 12px;
            font-weight: 700;
            color: #486073;
            text-align: right;
            white-space: nowrap;
        }

        .board-analysis-shell {
            margin-top: 22px;
            padding: 22px 24px;
            border-radius: 24px;
            border: 1px solid rgba(18, 181, 122, 0.14);
            background:
                radial-gradient(circle at top right, rgba(18, 181, 122, 0.12), transparent 32%),
                linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(242,249,246,0.98) 100%);
            box-shadow: var(--shadow);
        }

        .board-analysis-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .board-analysis-kicker {
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #4a8d72;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .board-analysis-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .board-analysis-subtitle {
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 760px;
        }

        .board-analysis-period {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(18, 181, 122, 0.08);
            color: #1b6d50;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .board-analysis-grid {
            display: grid;
            grid-template-columns: 1.15fr 0.95fr;
            gap: 16px;
        }

        .board-analysis-panel {
            padding: 18px 18px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.88);
            border: 1px solid rgba(216, 224, 232, 0.9);
        }

        .board-analysis-panel-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }

        .board-analysis-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .board-analysis-metric {
            padding: 14px 14px 12px;
            border-radius: 16px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fcfa 100%);
            border: 1px solid rgba(216, 224, 232, 0.9);
        }

        .board-analysis-label {
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .board-analysis-value {
            font-size: 22px;
            line-height: 1.1;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .board-analysis-note {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .board-analysis-list {
            display: grid;
            gap: 10px;
        }

        .board-analysis-item {
            padding: 12px 14px;
            border-radius: 16px;
            background: #f8fbfd;
            border: 1px solid rgba(216, 224, 232, 0.72);
        }

        .board-analysis-item strong {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            color: var(--text);
        }

        .board-analysis-item span {
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .board-analysis-empty {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .scope-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            margin-top: 12px;
            margin-bottom: 18px;
        }

        .scope-title-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .scope-icon {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(11,59,102,0.12) 0%, rgba(13,148,136,0.14) 100%);
            border: 1px solid rgba(13, 148, 136, 0.16);
            font-size: 26px;
        }

        .scope-caption {
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .scope-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }

        .scope-subtitle {
            margin-top: 4px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .scope-filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }

        .scope-filter-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        .scope-filter-card {
            position: relative;
            width: 168px;
        }

        .scope-filter-card::after {
            content: "";
            position: absolute;
            right: 12px;
            top: 50%;
            width: 8px;
            height: 8px;
            border-right: 1.5px solid #7b8ea1;
            border-bottom: 1.5px solid #7b8ea1;
            transform: translateY(-70%) rotate(45deg);
            pointer-events: none;
        }

        .scope-filter-select {
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            padding: 11px 30px 11px 12px;
            border-radius: 16px;
            border: 1px solid rgba(182, 208, 221, 0.95);
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(249,251,253,0.96));
            box-shadow: 0 4px 12px rgba(15, 59, 102, 0.05);
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
            color: #223448;
            cursor: pointer;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .scope-filter-select:hover {
            transform: translateY(-1px);
            border-color: rgba(22, 183, 127, 0.42);
        }

        .scope-filter-select:focus {
            outline: none;
            border-color: rgba(22, 183, 127, 0.68);
            box-shadow: 0 0 0 6px rgba(22, 183, 127, 0.12);
        }

        .calendar-board {
            display: grid;
            gap: 18px;
        }

        .calendar-month-panel {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
        }

        .calendar-month-chip {
            border: 1px solid #d3dfe8;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(246,250,252,0.96));
            color: #355166;
            padding: 9px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .calendar-month-chip.active {
            background: linear-gradient(135deg, #0e9f6e, #109c84);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 10px 24px rgba(14, 159, 110, 0.18);
        }

        .calendar-shell {
            border: 1px solid var(--line);
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(246,249,252,0.96));
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .calendar-header-row,
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
        }

        .calendar-header-cell {
            padding: 12px 10px;
            background: #eef5f8;
            border-right: 1px solid #dde7ee;
            border-bottom: 1px solid #dde7ee;
            font-size: 12px;
            font-weight: 800;
            color: #537086;
            text-align: center;
            letter-spacing: 0.04em;
        }

        .calendar-header-cell:last-child {
            border-right: none;
        }

        .calendar-day-cell {
            min-height: 168px;
            padding: 10px;
            border-right: 1px solid #ebf1f5;
            border-bottom: 1px solid #ebf1f5;
            background: rgba(255,255,255,0.92);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .calendar-day-cell:nth-child(7n) {
            border-right: none;
        }

        .calendar-day-cell.is-empty {
            background: rgba(243,247,250,0.72);
        }

        .calendar-day-cell.is-weekend {
            background: linear-gradient(180deg, rgba(255,249,247,0.96), rgba(255,255,255,0.92));
        }

        .calendar-day-cell.is-today {
            background: linear-gradient(180deg, rgba(227,250,242,0.95), rgba(255,255,255,0.94));
            box-shadow: inset 0 0 0 2px rgba(14, 159, 110, 0.16);
        }

        .calendar-day-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .calendar-day-number {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
        }

        .calendar-day-meta {
            font-size: 11px;
            color: var(--muted);
        }

        .calendar-task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .calendar-task-card {
            padding: 8px 9px;
            border-radius: 12px;
            border: 1px solid #dbe7ef;
            border-left: 4px solid #9fb0bf;
            background: rgba(255,255,255,0.96);
            box-shadow: 0 6px 14px rgba(29, 45, 63, 0.04);
            display: grid;
            gap: 4px;
        }

        .calendar-task-version {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            width: fit-content;
            max-width: 100%;
            padding: 4px 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(14, 159, 110, 0.16), rgba(16, 156, 132, 0.1));
            border: 1px solid rgba(14, 159, 110, 0.18);
            color: #0f6f58;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.04em;
            line-height: 1.4;
            word-break: break-word;
        }

        .calendar-task-version.version-tone-pro {
            background: linear-gradient(135deg, rgba(244, 143, 177, 0.24), rgba(255, 228, 236, 0.92));
            border-color: rgba(236, 72, 153, 0.24);
            color: #b4236b;
        }

        .calendar-task-version.version-tone-lynx {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.24), rgba(230, 243, 255, 0.94));
            border-color: rgba(59, 130, 246, 0.22);
            color: #1d5fbf;
        }

        .calendar-task-version.version-tone-com {
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.22), rgba(235, 252, 240, 0.96));
            border-color: rgba(34, 197, 94, 0.24);
            color: #1f8a4c;
        }

        .calendar-task-version.version-tone-uwp {

            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,250,252,0.95));

            padding: 18px;

            gap: 10px;

            bottom: 28px;

            align-items: center;

            border-radius: 14px;

            color: #ffffff;

            color: var(--muted);

            border-bottom: 1px solid var(--line);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .department-line-row {
            border-bottom: 1px solid var(--line);
            transition: background 0.2s ease;

        .department-line-row:last-child {
            border-bottom: none;

            background: rgba(13,148,136,0.04);

        .department-line-task {

            color: var(--text-secondary);
            line-height: 1.6;

        .department-line-owner,
        .department-line-updated {
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
        }

        .department-line-progress {
            display: grid;
            gap: 6px;
        }

        .department-line-progress .progress {
            min-width: 0;
        }

        .department-line-progress-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);

        .department-line-objective {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .department-line-objective strong {
            color: var(--text);
        }

        .empty-state {
            padding: 40px 24px;
            border-radius: 20px;
            background: rgba(255,255,255,0.82);
            border: 1px dashed rgba(112, 128, 147, 0.36);
            text-align: center;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            .hero,
            .scope-header,
            .stage-board-head,
            .board-analysis-head,
            .task-header {
                grid-template-columns: 1fr;

    <script>
        const PRODUCT_ORDER = ['PDF Reader Pro', 'LynxPDF', 'UWP', 'ComPDF', 'ComPDF AI', 'PDF业务线其他', 'COM业务线其他', '部门事务', '其他'];
        const TASK_TYPE_ORDER = ['产品规划', '版本内审', 'UI设计', '确认文案+设计图', '版本外审', '撰写验收文档', '版本验收', '调研分析', '产出增长方案', '数据看板维护', '项目复盘', '其他'];
        const PAGE_STORAGE_KEY = 'department_management_current_page';
        const PUBLIC_PAGE_QUERY_KEY = 'public';
        const ALLOWED_PUBLIC_PAGES = ['department-overview'];
        const APP_ORIGIN = (() => {
            const { protocol, hostname, port, origin } = window.location;
            if (protocol === 'file:') return 'http://localhost:9020';
            if ((hostname === 'localhost' || hostname === '127.0.0.1') && port && port !== '9020') {
                return 'http://localhost:9020';
            }
            return origin;
        })();

        const state = {
            currentPage: 'department-overview',
            publicPage: '',
            preloadedRows: Array.isArray(window.__departmentDashboardRecords) ? window.__departmentDashboardRecords : [],
            normalizedRows: [],
            members: [
                { name: '李鑫', group: '专案组' },
                { name: '贺季康', group: '专案组' },
                { name: '杨荣', group: '专案组' },
                { name: '彭紫琼', group: '专案组' },
                { name: '陈轺', group: '设计组' },
                { name: '陈碧雪', group: '设计组' },
                { name: '罗婉珠', group: '设计组' },
                { name: '董倩雨', group: '设计组' }
            ],
            memberMeta: {
                '李鑫': { group: '专案组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '贺季康': { group: '专案组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '杨荣': { group: '专案组', products: ['ComPDF'] },
                '彭紫琼': { group: '专案组', products: ['ComPDF AI'] },
                '陈轺': { group: '设计组', products: ['ComPDF AI'] },
                '陈碧雪': { group: '设计组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '罗婉珠': { group: '设计组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '董倩雨': { group: '设计组', products: ['ComPDF'] }
            },
            filterPeriodType: 'month',
            filterMonth: '',
            filterQuarter: '',
            departmentFilterGroup: 'all',
            departmentFilterMember: 'all',
            departmentFilterStatus: 'all',
            departmentFilterBusiness: 'all',
            departmentFilterProduct: 'all',
            departmentFilterTaskType: 'all',
            calendarMonth: '',
            calendarMode: 'all',
            calendarFilterGroup: 'all',
            calendarFilterMember: 'all',
            groupFilterMember: 'all',
            groupFilterStatus: 'all',
            groupFilterBusiness: 'all',
            groupFilterProduct: 'all',
            groupFilterTaskType: 'all',
            personFilterStatus: 'all',
            personFilterBusiness: 'all',
            personFilterProduct: 'all',
            personFilterTaskType: 'all',
            productSelection: {},
            infoSource: {
                metaLoaded: false,
                linkMap: {},
                admin: null
            },
            dashboardUpdatedAt: window.__departmentDashboardMeta?.updated_at || '',
            toastTimer: null
        };

        function normalizeProduct(product) {
            if (!product || !String(product).trim()) return '其他';
            const normalized = String(product).trim();
            if (normalized === 'PDF Reader Pro-UWP' || normalized === 'UWP营收') return 'UWP';
            if (normalized === 'ComPDF SDK') return 'ComPDF';
            if (normalized === '跨产品/协作' || normalized === '未归类') return '其他';
            return normalized;
        }

        function normalizeRecord(row) {
            if (!row) return null;
            const riskLevel = row.risk || '';
            return {
                id: row.id || Math.random().toString(36).slice(2, 11),
                person: row.person || '',
                period_type: row.period_type || '',
                period: row.period || '',
                task: row.task || row.task_name || '',
                status: row.status || '待开始',
                progress: Math.min(Math.max(parseInt(row.progress, 10) || 0, 0), 100),
                business_kr: row.business_kr || '',
                business_kr_id: row.business_kr_id || row.business_kr || '',
                key_result: row.key_result || '',
                key_result_text: row.key_result_text || row.key_result || '',
                objective_id: row.objective_id || '',
                objective_text: row.objective_text || '',
                product_line: normalizeProduct(row.product_line),
                team: row.team || '',
                raw_owner: row.raw_owner || row.person || '',
                start_time: row.start_time || '',
                due_time: row.due_time || '',
                progress_text: row.progress_text || '',
                version_no: row.version_no || '',
                version_requirement: row.version_requirement || '',
                deliverable_type: row.deliverable_type || row.deliverable || '',
                task_type: row.task_type || '其他',
                deliverable_link: row.deliverable_link || '',
                risk_note: row.risk_note || '',
                actual_delivery_time: row.actual_delivery_time || '',
                note: row.note || '',
                riskLevel,
                isHighRisk: riskLevel === '高' || riskLevel === '是' || riskLevel === true
            };
        }

        function formatDashboardUpdatedAt(value) {
            if (!value) return '未记录';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return String(value);
            return parsed.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            }).replace(/\//g, '-');
        }

        function getBusinessLine(row) {
            const productLine = normalizeProduct(row?.product_line || '');
            if (['PDF Reader Pro', 'LynxPDF', 'UWP', 'PDF业务线其他'].includes(productLine)) return 'PDF业务线';
            if (['ComPDF', 'ComPDF AI', 'COM业务线其他'].includes(productLine)) return 'COM业务线';

            const sourceText = `${row?.business_kr_id || ''} ${row?.objective_text || ''} ${row?.key_result_text || ''}`;
            if (/PDF|Lynx|UWP/i.test(sourceText)) return 'PDF业务线';
            if (/COM|ComPDF/i.test(sourceText)) return 'COM业务线';
            return '';
        }

        function sortByConfiguredOrder(values, order) {
            return [...new Set(values.filter(Boolean))].sort((left, right) => {
                const leftIndex = order.indexOf(left);
                const rightIndex = order.indexOf(right);
                const safeLeft = leftIndex === -1 ? order.length : leftIndex;
                const safeRight = rightIndex === -1 ? order.length : rightIndex;
                if (safeLeft !== safeRight) return safeLeft - safeRight;
                return String(left).localeCompare(String(right), 'zh-CN');
            });
        }

        function updateTopbarMeta() {
            const node = document.getElementById('topbar-meta');
            if (!node) return;
            node.innerHTML = `
                <div>
                    <div class="topbar-meta-label">数据刷新时间</div>
                    <div class="topbar-meta-value">${formatDashboardUpdatedAt(state.dashboardUpdatedAt)}</div>
                </div>
            `;
        }

        function getPublicPageFromUrl() {
            const searchParams = new URLSearchParams(window.location.search);
            const requestedPage = normalizePageId((searchParams.get(PUBLIC_PAGE_QUERY_KEY) || '').trim());
            if (ALLOWED_PUBLIC_PAGES.includes(requestedPage)) return requestedPage;
            return '';
        }

        function isPublicSinglePageMode() {
            return Boolean(state.publicPage);
        }

        function applyPublicPageChrome() {
            const isPublic = isPublicSinglePageMode();
            document.body.classList.toggle('public-single-page', isPublic);

            const titleNode = document.querySelector('.topbar-title');
            const subtitleNode = document.querySelector('.topbar-subtitle');
            if (!titleNode || !subtitleNode) return;

            if (isPublic && state.publicPage === 'department-overview') {
                titleNode.textContent = '产品设计部任务管理-公用版';
                subtitleNode.textContent = '产品设计部';
                return;
            }

            titleNode.textContent = '产品设计部管理看板';
            subtitleNode.textContent = '产品设计部';
        }

        function renderPublicPageNote() {
            return '';
        }

        function renderPublicMemberSummary(rows, periodLabel) {
            if (!isPublicSinglePageMode() || state.publicPage !== 'department-overview') return '';

            if (!rows.length) {
                return `
                    <section class="public-member-summary">
                        <div class="public-member-summary-head">
                            <div>
                                <div class="public-member-summary-kicker">Member Summary</div>
                                <div class="public-member-summary-title">本期任务摘要</div>
                                <div class="public-member-summary-subtitle">当前筛选范围下暂无任务，调整筛选条件后会自动刷新这里的摘要。</div>
                            </div>
                            <div class="public-member-summary-meta">${escapeHtml(periodLabel || '当前周期')}</div>
                        </div>
                    </section>
                `;
            }

            const completed = rows.filter(row => row.progress >= 100 || row.status === '已完成').length;
            const completionRate = rows.length ? Math.round((completed / rows.length) * 100) : 0;
            const productStats = rows.reduce((acc, row) => {
                const key = normalizeProduct(row.product_line);
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
            const taskTypeStats = rows.reduce((acc, row) => {
                const key = row.task_type || '其他';
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
            const topEntry = stats => Object.entries(stats).sort((left, right) => right[1] - left[1])[0] || ['—', 0];
            const [topProduct, topProductCount] = topEntry(productStats);
            const [topTaskType, topTaskTypeCount] = topEntry(taskTypeStats);

            return `
                <section class="public-member-summary">
                    <div class="public-member-summary-head">
                        <div>
                            <div class="public-member-summary-kicker">Member Summary</div>
                            <div class="public-member-summary-title">本期任务摘要</div>
                            <div class="public-member-summary-subtitle">这里保留当前周期的核心信息，方便成员快速查看进展，不展示偏管理层的分析判断。</div>
                        </div>
                        <div class="public-member-summary-meta">${escapeHtml(periodLabel || '当前周期')}</div>
                    </div>
                    <div class="public-member-summary-grid">
                        <div class="public-member-summary-card">
                            <div class="public-member-summary-label">任务总数</div>
                            <div class="public-member-summary-value">${rows.length}</div>
                            <div class="public-member-summary-note">当前筛选范围内的全部任务。</div>
                        </div>
                        <div class="public-member-summary-card">
                            <div class="public-member-summary-label">完成率</div>
                            <div class="public-member-summary-value">${completionRate}%</div>
                            <div class="public-member-summary-note">其中 ${completed} 项已完成或达到 100%。</div>
                        </div>
                        <div class="public-member-summary-card">
                            <div class="public-member-summary-label">当前重点产品</div>
                            <div class="public-member-summary-value">${escapeHtml(topProduct)}</div>
                            <div class="public-member-summary-note">当前有 ${topProductCount} 项任务集中在这个产品线上。</div>
                        </div>
                        <div class="public-member-summary-card">
                            <div class="public-member-summary-label">高频任务类型</div>
                            <div class="public-member-summary-value">${escapeHtml(topTaskType)}</div>
                            <div class="public-member-summary-note">当前有 ${topTaskTypeCount} 项属于这一类任务。</div>
                        </div>
                    </div>
                </section>
            `;
        }

        function normalizePageId(pageId) {
            if (pageId === 'department') return 'department-overview';
            return pageId;
        }

        function isKnownPage(pageId) {
            const normalized = normalizePageId(pageId);
            if (!normalized) return false;
            if (['department-overview', 'department-calendar', 'zalist-overview', 'design-overview'].includes(normalized)) return true;
            return /^person-\d+$/.test(pageId);
        }

        function renderOkrBoardPage() {
            const okrSrc = `OKR管理看板.html?embed=1&t=${Date.now()}`;
            const currentPeriod = getCurrentPeriod() || '当前默认周期';
            const periodRows = getPeriodData(state.normalizedRows);
            return `
                <div class="okr-preview-shell">
                    <section class="okr-preview-hero">
                        <div class="okr-preview-hero-inner">
                            <div>
                                <div class="okr-preview-kicker">Monthly OKR Board</div>

                                <p class="okr-preview-subtitle">页面结构先对齐你参考的 Redmine 数据看板页，但展示口径已经收敛为“月度 OKR Sheet 单一来源”。成员统一在月度 OKR 表中维护，这里只负责展示与浏览。</p>

                    <section class="okr-preview-meta-grid">

                        </div>
                        <div class="okr-preview-meta-card">

        function getInitialPage() {
            if (isPublicSinglePageMode()) return state.publicPage;
            const hashPage = normalizePageId(decodeURIComponent(window.location.hash.replace(/^#/, '')).trim());
            if (isKnownPage(hashPage)) return hashPage;
            const storedPage = normalizePageId(localStorage.getItem(PAGE_STORAGE_KEY) || '');
            if (isKnownPage(storedPage)) return storedPage;
            return 'department-overview';
        }

        function persistCurrentPage(pageId) {
            const normalized = normalizePageId(pageId);
            if (!isKnownPage(normalized)) return;
            if (isPublicSinglePageMode()) return;
            localStorage.setItem(PAGE_STORAGE_KEY, normalized);
            const nextHash = `#${encodeURIComponent(normalized)}`;
            if (window.location.hash !== nextHash) {
                window.history.replaceState(null, '', nextHash);
            }
        }

        function initData() {
            state.publicPage = getPublicPageFromUrl();
            const memberNames = state.members.map(member => member.name);
            state.normalizedRows = state.preloadedRows
                .map(normalizeRecord)
                .filter(row => row && ((row.person && memberNames.includes(row.person)) || row.raw_owner || row.objective_id));

            const monthRows = state.normalizedRows.filter(row => row.period_type === 'month');
            const quarterRows = state.normalizedRows.filter(row => row.period_type === 'quarter');

            if (monthRows.length > 0) {
                state.filterMonth = [...new Set(monthRows.map(row => row.period))].sort().reverse()[0];
                const availableMonths = [...new Set(monthRows.map(row => row.period))].sort().reverse();
                const today = new Date();
                const currentMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
                state.calendarMonth = availableMonths.includes(currentMonth) ? currentMonth : (availableMonths[0] || '');
            }

            if (quarterRows.length > 0) {
                state.filterQuarter = [...new Set(quarterRows.map(row => row.period))].sort().reverse()[0];
            }

            const initialPage = normalizePageId(getInitialPage());
            state.currentPage = initialPage;
            applyPublicPageChrome();
            updateTopbarMeta();
            setActiveNav(initialPage);
            renderPage(initialPage);
        }

        function toggleNav1(event) {
            const rootNode = event.target.closest('.nav-level-1-title');
            rootNode.classList.toggle('expanded');

        function toggleNav2(event) {
            const currentNode = event.target.closest('.nav-level-2-title');
            const groupNodes = [...document.querySelectorAll('.nav-level-2-title[onclick="toggleNav2(event)"]')];
            const shouldExpand = !currentNode.classList.contains('expanded');

            groupNodes.forEach(node => {
                node.classList.remove('expanded');
                const memberFolder = node.nextElementSibling?.querySelector('.nav-folder-title');
                if (memberFolder) memberFolder.classList.remove('expanded');
            });

            if (shouldExpand) currentNode.classList.add('expanded');
            event.stopPropagation();
        }

        function toggleNav3(event) {
            const currentNode = event.target.closest('.nav-folder-title');
            const siblingFolders = [...currentNode.closest('.nav-level-3-container').querySelectorAll('.nav-folder-title')];
            const shouldExpand = !currentNode.classList.contains('expanded');

            siblingFolders.forEach(node => node.classList.remove('expanded'));
            if (shouldExpand) currentNode.classList.add('expanded');
            event.stopPropagation();
        }

        function syncNavExpansion(pageId) {
            const normalized = normalizePageId(pageId);
            const rootNode = document.querySelector('.nav-level-1-title');
            const groupNodes = [...document.querySelectorAll('.nav-level-2-title[onclick="toggleNav2(event)"]')];
            const departmentBoardNode = groupNodes.find(node => node.textContent.includes('部门看板')) || null;
            const projectGroupNode = groupNodes.find(node => node.textContent.includes('专案组')) || null;
            const designGroupNode = groupNodes.find(node => node.textContent.includes('设计组')) || null;
            const projectMemberFolder = projectGroupNode?.nextElementSibling?.querySelector('.nav-folder-title') || null;
            const designMemberFolder = designGroupNode?.nextElementSibling?.querySelector('.nav-folder-title') || null;

            if (rootNode) {
                rootNode.classList.add('expanded');
            }

            [departmentBoardNode, projectGroupNode, designGroupNode, projectMemberFolder, designMemberFolder]
                .filter(Boolean)
                .forEach(node => node.classList.remove('expanded'));

            if (normalized === 'department-overview' || normalized === 'department-calendar') {
                if (departmentBoardNode) departmentBoardNode.classList.add('expanded');
            }

            if (normalized === 'zalist-overview' || /^person-[0-3]$/.test(normalized)) {
                if (projectGroupNode) projectGroupNode.classList.add('expanded');
            }

            if (normalized === 'design-overview' || /^person-[4-7]$/.test(normalized)) {
                if (designGroupNode) designGroupNode.classList.add('expanded');
            }

            if (/^person-[0-3]$/.test(normalized) && projectMemberFolder) {
                projectMemberFolder.classList.add('expanded');
            }

            if (/^person-[4-7]$/.test(normalized) && designMemberFolder) {
                designMemberFolder.classList.add('expanded');

        function setActiveNav(pageId) {
            if (isPublicSinglePageMode()) return;
            const normalized = normalizePageId(pageId);
            document.querySelectorAll('.nav-level-1-title, .nav-level-2-title, .nav-folder-title, .nav-item, .nav-subitem').forEach(item => {
                item.classList.remove('active', 'active-trail');
            });

            const rootNode = document.querySelector('.nav-level-1-title');
            if (rootNode) rootNode.classList.add('active-trail');

            syncNavExpansion(normalized);

            const selector = `[onclick="switchPage('${normalized}')"]`;
            const activeNode = document.querySelector(selector);
            if (activeNode) activeNode.classList.add('active');

            const groupNodes = [...document.querySelectorAll('.nav-level-2-title[onclick="toggleNav2(event)"]')];
            const departmentBoardNode = groupNodes.find(node => node.textContent.includes('部门看板')) || null;
            const projectGroupNode = groupNodes.find(node => node.textContent.includes('专案组')) || null;
            const designGroupNode = groupNodes.find(node => node.textContent.includes('设计组')) || null;
            const projectMemberFolder = projectGroupNode?.nextElementSibling?.querySelector('.nav-folder-title');
            const designMemberFolder = designGroupNode?.nextElementSibling?.querySelector('.nav-folder-title');

            if ((normalized === 'department-overview' || normalized === 'department-calendar') && departmentBoardNode) {
                departmentBoardNode.classList.add('active-trail');
            }

            if (normalized === 'zalist-overview' && projectGroupNode) {
                projectGroupNode.classList.add('active-trail');
            }

            if (normalized === 'design-overview' && designGroupNode) {
                designGroupNode.classList.add('active-trail');
            }

            if (['department-overview', 'department-calendar'].includes(normalized)) {
                return;
            }

            if (/^person-[0-3]$/.test(normalized)) {
                if (projectGroupNode) projectGroupNode.classList.add('active-trail');
                if (projectMemberFolder) projectMemberFolder.classList.add('active-trail');

            if (/^person-[4-7]$/.test(normalized)) {

                if (designMemberFolder) designMemberFolder.classList.add('active-trail');

        function switchPage(pageId) {

        function getCurrentPeriod() {

        function getScopeConfig(pageId) {
            if (pageId === 'zalist-overview') {
                return {
                    icon: '◧',

            if (pageId === 'design-overview') {
                return {

                    title: '设计组',
                    subtitle: '设计执行视角 · 横向查看各产品阶段版本与任务',

                        const member = state.members.find(item => item.name === row.person);
                        return member && member.group === '设计组';
                    }))

            if (pageId.startsWith('person-')) {
