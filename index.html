    <script>
        const PRODUCT_ORDER = ['PDF Reader Pro', 'LynxPDF', 'UWP', 'ComPDF', 'ComPDF AI', 'PDF业务线其他', 'COM业务线其他', '部门事务', '其他'];
        const TASK_TYPE_ORDER = ['产品规划', '版本内审', 'UI设计', '确认文案+设计图', '版本外审', '撰写验收文档', '版本验收', '调研分析', '产出增长方案', '数据看板维护', '项目复盘', '其他'];
        const PAGE_STORAGE_KEY = 'department_management_current_page';
        const SIDEBAR_COLLAPSED_STORAGE_KEY = 'department_management_sidebar_collapsed';
        const PUBLIC_SIDEBAR_COLLAPSED_STORAGE_KEY = 'department_management_public_sidebar_collapsed';
        const WEEKLY_BOARD_ALL_VALUE = '__all__';
        const PUBLIC_PAGE_QUERY_KEY = 'public';
        const ALLOWED_PUBLIC_PAGES = ['department-overview', 'department-calendar', 'department-weekly'];
        const APP_ORIGIN = (() => {
            const { protocol, hostname, port, origin } = window.location;
            if (protocol === 'file:') return 'http://localhost:9020';
            if ((hostname === 'localhost' || hostname === '127.0.0.1') && port && port !== '9020') {
                return 'http://localhost:9020';
            }
            return origin;
        })();

        const state = {
            currentPage: 'department-overview',
            publicPage: '',
            preloadedRows: Array.isArray(window.__departmentDashboardRecords) ? window.__departmentDashboardRecords : [],
            normalizedRows: [],
            weeklyProgressEntries: loadWeeklyProgressEntries(),
            members: [
                { name: '李鑫', group: '专案组' },
                { name: '贺季康', group: '专案组' },
                { name: '杨荣', group: '专案组' },
                { name: '彭紫琼', group: '专案组' },
                { name: '陈轺', group: '设计组' },
                { name: '陈碧雪', group: '设计组' },
                { name: '罗婉珠', group: '设计组' },
                { name: '董倩雨', group: '设计组' }
            ],
            memberMeta: {
                '李鑫': { group: '专案组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '贺季康': { group: '专案组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '杨荣': { group: '专案组', products: ['ComPDF'] },
                '彭紫琼': { group: '专案组', products: ['ComPDF AI'] },
                '陈轺': { group: '设计组', products: ['ComPDF AI'] },
                '陈碧雪': { group: '设计组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '罗婉珠': { group: '设计组', products: ['PDF Reader Pro', 'LynxPDF', 'UWP'] },
                '董倩雨': { group: '设计组', products: ['ComPDF'] }
            },
            filterPeriodType: 'month',
            filterMonth: '',
            filterQuarter: '',
            departmentFilterGroup: 'all',
            departmentFilterMember: 'all',
            departmentFilterStatus: 'all',
            departmentFilterBusiness: 'all',
            departmentFilterProduct: 'all',
            departmentFilterTaskType: 'all',
            calendarMonth: '',
            calendarMode: 'all',
            calendarFilterGroup: 'all',
            calendarFilterMember: 'all',
            weeklyBoardMode: 'week',
            weeklyBoardWeek: getCurrentWeekKey(),
            weeklyBoardMonth: getCurrentMonthKey(),
            weeklyBoardQuarter: getCurrentQuarterKey(),
            weeklyBoardPickerOpen: false,
            weeklyBoardDetailsExpanded: false,
            weeklyBoardPickerYear: new Date().getFullYear(),
            weeklyBoardMember: 'all',
            weeklyBoardProduct: 'all',
            weeklyBoardStatus: 'all',
            sidebarCollapsed: false,
            publicSidebarCollapsed: false,
            groupFilterMember: 'all',
            groupFilterStatus: 'all',
            groupFilterBusiness: 'all',
            groupFilterProduct: 'all',
            groupFilterTaskType: 'all',
            personFilterStatus: 'all',
            personFilterBusiness: 'all',
            personFilterProduct: 'all',
            personFilterTaskType: 'all',
            productSelection: {},
            infoSource: {
                metaLoaded: false,
                linkMap: {},
                admin: null
            },
            dashboardUpdatedAt: window.__departmentDashboardMeta?.updated_at || '',
            toastTimer: null
        };

        function normalizeProduct(product) {
            if (!product || !String(product).trim()) return '其他';
            const normalized = String(product).trim();
            if (normalized === 'PDF Reader Pro-UWP' || normalized === 'UWP营收') return 'UWP';
            if (normalized === 'ComPDF SDK') return 'ComPDF';
            if (normalized === '跨产品/协作' || normalized === '未归类') return '其他';
            return normalized;
        }

        function normalizeRecord(row) {
            if (!row) return null;
            const riskLevel = row.risk || '';
            return {
                id: row.id || Math.random().toString(36).slice(2, 11),
                person: row.person || '',
                period_type: row.period_type || '',
                period: row.period || '',
                task: row.task || row.task_name || '',
                status: row.status || '待开始',
                progress: Math.min(Math.max(parseInt(row.progress, 10) || 0, 0), 100),
                business_kr: row.business_kr || '',
                business_kr_id: row.business_kr_id || row.business_kr || '',
                key_result: row.key_result || '',
                key_result_text: row.key_result_text || row.key_result || '',
                objective_id: row.objective_id || '',
                objective_text: row.objective_text || '',
                product_line: normalizeProduct(row.product_line),
                team: row.team || '',
                raw_owner: row.raw_owner || row.person || '',
                start_time: row.start_time || '',
                due_time: row.due_time || '',
                progress_text: row.progress_text || '',
                version_no: row.version_no || '',
                version_requirement: row.version_requirement || '',
                deliverable_type: row.deliverable_type || row.deliverable || '',
                task_type: row.task_type || '其他',
                deliverable_link: row.deliverable_link || '',
                risk_note: row.risk_note || '',
                actual_delivery_time: row.actual_delivery_time || '',
                note: row.note || '',
                riskLevel,
                isHighRisk: riskLevel === '高' || riskLevel === '是' || riskLevel === true
            };
        }

        function formatDashboardUpdatedAt(value) {
            if (!value) return '未记录';
            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) return String(value);
            return parsed.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            }).replace(/\//g, '-');
        }

        function getBusinessLine(row) {
            const productLine = normalizeProduct(row?.product_line || '');
            if (['PDF Reader Pro', 'LynxPDF', 'UWP', 'PDF业务线其他'].includes(productLine)) return 'PDF业务线';
            if (['ComPDF', 'ComPDF AI', 'COM业务线其他'].includes(productLine)) return 'COM业务线';

            const sourceText = `${row?.business_kr_id || ''} ${row?.objective_text || ''} ${row?.key_result_text || ''}`;
            if (/PDF|Lynx|UWP/i.test(sourceText)) return 'PDF业务线';
            if (/COM|ComPDF/i.test(sourceText)) return 'COM业务线';
            return '';
        }

        function sortByConfiguredOrder(values, order) {
            return [...new Set(values.filter(Boolean))].sort((left, right) => {
                const leftIndex = order.indexOf(left);
                const rightIndex = order.indexOf(right);
                const safeLeft = leftIndex === -1 ? order.length : leftIndex;
                const safeRight = rightIndex === -1 ? order.length : rightIndex;
                if (safeLeft !== safeRight) return safeLeft - safeRight;
                return String(left).localeCompare(String(right), 'zh-CN');
            });
        }

        function updateTopbarMeta() {
            const node = document.getElementById('topbar-meta');
            if (!node) return;
            node.innerHTML = `
                <div>
                    <div class="topbar-meta-label">数据刷新时间</div>
                    <div class="topbar-meta-value">${formatDashboardUpdatedAt(state.dashboardUpdatedAt)}</div>
                </div>
            `;
        }

        function applySidebarState() {
            document.body.classList.toggle('sidebar-collapsed', !!state.sidebarCollapsed);
            const button = document.querySelector('.sidebar-collapse-btn');
            if (!button) return;
            const collapsed = !!state.sidebarCollapsed;
            button.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');
            button.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');
            button.textContent = '‹';
        }

        function toggleSidebar() {
            if (isPublicSinglePageMode()) return;
            state.sidebarCollapsed = !state.sidebarCollapsed;
            localStorage.setItem(SIDEBAR_COLLAPSED_STORAGE_KEY, state.sidebarCollapsed ? '1' : '0');
            applySidebarState();
        }

        function togglePublicSidebar() {
            if (!isPublicSinglePageMode()) return;
            state.publicSidebarCollapsed = !state.publicSidebarCollapsed;
            localStorage.setItem(PUBLIC_SIDEBAR_COLLAPSED_STORAGE_KEY, state.publicSidebarCollapsed ? '1' : '0');
            renderPage(state.currentPage);
        }

        function resolveTopbarContext(pageId) {
            const normalized = normalizePageId(pageId);
            const period = getCurrentPeriod();

            if (normalized === 'department-calendar') {
                const calendarMonth = ensureCalendarMonth();
                return {
                    title: '日历看板',
                    subtitle: `部门看板 / 按天查看任务落点，支持按月份、小组、成员切换 · 月份 ${formatCalendarMonthLabel(calendarMonth)}`
                };
            }

            if (normalized === 'department-weekly') {
                const mode = ['week', 'month', 'quarter'].includes(state.weeklyBoardMode) ? state.weeklyBoardMode : 'week';
                return {
                    title: '工作进度追踪',
                    subtitle: ''
                };
            }

            if (normalized === 'okr-board') {
                return {
                    title: 'OKR 管理台',
                    subtitle: '管理看板 / 查看 OKR 结构、字段映射与清洗结果'
                };
            }

            if (normalized === 'info-source') {
                return {
                    title: '事实来源说明',
                    subtitle: '管理看板 / 核对导入来源、任务口径与管理分析链路'
                };
            }

            const scope = getScopeConfig(normalized);
            if (scope?.title) {
                return {
                    title: scope.title,
                    subtitle: `${scope.subtitle} · 周期 ${period}`
                };
            }

            return {
                title: '管理看板',
                subtitle: '产品设计部'
            };
        }

        function updateTopbarContext(pageId) {
            const titleNode = document.querySelector('.topbar-title');
            const subtitleNode = document.querySelector('.topbar-subtitle');
            if (!titleNode || !subtitleNode) return;

            if (isPublicSinglePageMode() && ALLOWED_PUBLIC_PAGES.includes(state.publicPage)) {
                const context = resolveTopbarContext(pageId);
                titleNode.textContent = `${context.title} · 公用版`;
                subtitleNode.textContent = context.subtitle;
                return;
            }

            const context = resolveTopbarContext(pageId);
            titleNode.textContent = context.title;
            subtitleNode.textContent = context.subtitle;
        }

        function getPublicPageFromUrl() {
            const searchParams = new URLSearchParams(window.location.search);
            const requestedPage = normalizePageId((searchParams.get(PUBLIC_PAGE_QUERY_KEY) || '').trim());
            if (ALLOWED_PUBLIC_PAGES.includes(requestedPage)) return requestedPage;
            return 'department-overview';
        }

        function isPublicSinglePageMode() {
            return Boolean(state.publicPage);

        function getInitialPage() {
            if (isPublicSinglePageMode()) return state.publicPage;
            const hashPage = normalizePageId(decodeURIComponent(window.location.hash.replace(/^#/, '')).trim());
            if (isKnownPage(hashPage)) return hashPage;
            const storedPage = normalizePageId(localStorage.getItem(PAGE_STORAGE_KEY) || '');
            if (isKnownPage(storedPage)) return storedPage;
            return 'department-overview';
        }

        function persistCurrentPage(pageId) {
            const normalized = normalizePageId(pageId);
            if (!isKnownPage(normalized)) return;
            if (isPublicSinglePageMode()) return;
            localStorage.setItem(PAGE_STORAGE_KEY, normalized);
            const nextHash = `#${encodeURIComponent(normalized)}`;
            if (window.location.hash !== nextHash) {
                window.history.replaceState(null, '', nextHash);
            }
        }

        function initData() {
            state.publicPage = getPublicPageFromUrl();
            state.sidebarCollapsed = localStorage.getItem(SIDEBAR_COLLAPSED_STORAGE_KEY) === '1';
            state.publicSidebarCollapsed = localStorage.getItem(PUBLIC_SIDEBAR_COLLAPSED_STORAGE_KEY) === '1';
            const memberNames = state.members.map(member => member.name);
            state.normalizedRows = state.preloadedRows
                .map(normalizeRecord)
                .filter(row => row && ((row.person && memberNames.includes(row.person)) || row.raw_owner || row.objective_id));

            const monthRows = state.normalizedRows.filter(row => row.period_type === 'month');
            const quarterRows = state.normalizedRows.filter(row => row.period_type === 'quarter');

            if (monthRows.length > 0) {
                state.filterMonth = [...new Set(monthRows.map(row => row.period))].sort().reverse()[0];
                const availableMonths = [...new Set(monthRows.map(row => row.period))].sort().reverse();
                const today = new Date();
                const currentMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
                state.calendarMonth = availableMonths.includes(currentMonth) ? currentMonth : (availableMonths[0] || '');
            }

            if (quarterRows.length > 0) {
                state.filterQuarter = [...new Set(quarterRows.map(row => row.period))].sort().reverse()[0];
            }

            const initialPage = normalizePageId(getInitialPage());
            state.currentPage = initialPage;
            applyPublicPageChrome();
            applySidebarState();
            updateTopbarMeta();
            setActiveNav(initialPage);
            renderPage(initialPage);
        }

        function getWeekInfo(input) {
            const date = input instanceof Date ? new Date(input) : new Date(input || Date.now());
            const working = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const day = working.getUTCDay() || 7;
            working.setUTCDate(working.getUTCDate() + 4 - day);
            const yearStart = new Date(Date.UTC(working.getUTCFullYear(), 0, 1));
            const week = Math.ceil((((working - yearStart) / 86400000) + 1) / 7);
            return { year: working.getUTCFullYear(), week };
        }

        function getCurrentWeekKey() {
            const { year, week } = getWeekInfo(new Date());
            return `${year}-W${String(week).padStart(2, '0')}`;
        }

        function getCurrentMonthKey(date = new Date()) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function getCurrentQuarterKey(date = new Date()) {
            return `${date.getFullYear()}-Q${Math.floor(date.getMonth() / 3) + 1}`;
        }

        function parseWeekKey(weekKey) {
            const match = String(weekKey || '').match(/^(\d{4})-W(\d{2})$/);
            if (!match) return null;
            return { year: Number(match[1]), week: Number(match[2]) };
        }

        function parseMonthKey(monthKey) {
            const match = String(monthKey || '').match(/^(\d{4})-(\d{2})$/);
            if (!match) return null;
            return { year: Number(match[1]), month: Number(match[2]) };
        }

        function parseQuarterKey(quarterKey) {
            const match = String(quarterKey || '').match(/^(\d{4})-Q([1-4])$/);
            if (!match) return null;
            return { year: Number(match[1]), quarter: Number(match[2]) };
        }

        function getDateFromWeekKey(weekKey) {
            const parsed = parseWeekKey(weekKey);
            if (!parsed) return null;
            const simple = new Date(Date.UTC(parsed.year, 0, 4));
            const day = simple.getUTCDay() || 7;
            simple.setUTCDate(simple.getUTCDate() - day + 1 + ((parsed.week - 1) * 7));
            return simple;
        }

        function getDateFromMonthKey(monthKey) {
            const parsed = parseMonthKey(monthKey);
            if (!parsed) return null;
            return new Date(Date.UTC(parsed.year, parsed.month - 1, 1));
        }

        function getDateFromQuarterKey(quarterKey) {
            const parsed = parseQuarterKey(quarterKey);
            if (!parsed) return null;
            return new Date(Date.UTC(parsed.year, (parsed.quarter - 1) * 3, 1));
        }

        function shiftWeekKey(weekKey, offset) {
            const baseDate = getDateFromWeekKey(weekKey) || new Date();
            baseDate.setUTCDate(baseDate.getUTCDate() + (offset * 7));
            const { year, week } = getWeekInfo(baseDate);
            return `${year}-W${String(week).padStart(2, '0')}`;
        }

        function shiftMonthKey(monthKey, offset) {
            const baseDate = getDateFromMonthKey(monthKey) || new Date();
            baseDate.setUTCMonth(baseDate.getUTCMonth() + offset);
            return `${baseDate.getUTCFullYear()}-${String(baseDate.getUTCMonth() + 1).padStart(2, '0')}`;
        }

        function shiftQuarterKey(quarterKey, offset) {
            const baseDate = getDateFromQuarterKey(quarterKey) || new Date();
            baseDate.setUTCMonth(baseDate.getUTCMonth() + (offset * 3));
            return `${baseDate.getUTCFullYear()}-Q${Math.floor(baseDate.getUTCMonth() / 3) + 1}`;
        }

        function compareWeekKey(left, right) {
            const leftDate = getDateFromWeekKey(left);
            const rightDate = getDateFromWeekKey(right);
            if (!leftDate || !rightDate) return String(left || '').localeCompare(String(right || ''));
            return leftDate - rightDate;
        }

        function formatDateDisplay(date, withYear = false) {
            if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
            const yearPart = withYear ? `${date.getUTCFullYear()}年` : '';
            return `${yearPart}${date.getUTCMonth() + 1}月${date.getUTCDate()}日`;
        }

        function formatWeekLabel(weekKey, withRange = false) {
            const parsed = parseWeekKey(weekKey);
            if (!parsed) return '未选择周';
            if (withRange) {
                const startDate = getDateFromWeekKey(weekKey);
                const endDate = startDate ? new Date(startDate) : null;
                if (endDate) endDate.setUTCDate(endDate.getUTCDate() + 6);
                if (!startDate || !endDate) return '未选择周';
                const sameYear = startDate.getUTCFullYear() === endDate.getUTCFullYear();
                return `${formatDateDisplay(startDate, true)}-${formatDateDisplay(endDate, !sameYear)}`;
            }
            return `${parsed.year} 第 ${parsed.week} 周`;
        }

        function formatMonthLabel(monthKey, short = false) {
            const parsed = parseMonthKey(monthKey);
            if (!parsed) return '未选择月份';
            return short ? `${parsed.month}月` : `${parsed.year}年${parsed.month}月`;
        }

        function formatQuarterLabel(quarterKey, short = false) {
            const parsed = parseQuarterKey(quarterKey);
            if (!parsed) return '未选择季度';
            return short ? `Q${parsed.quarter}` : `${parsed.year}年第${parsed.quarter}季度`;
        }

        function getWeeklyBoardSelection(mode = state.weeklyBoardMode) {
            if (mode === 'month') return parseMonthKey(state.weeklyBoardMonth) ? state.weeklyBoardMonth : getCurrentMonthKey();
            if (mode === 'quarter') return parseQuarterKey(state.weeklyBoardQuarter) ? state.weeklyBoardQuarter : getCurrentQuarterKey();
            return parseWeekKey(state.weeklyBoardWeek) ? state.weeklyBoardWeek : getCurrentWeekKey();
        }

        function getMonthKeyFromDate(date) {
            if (!(date instanceof Date) || Number.isNaN(date.getTime())) return '';
            return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, '0')}`;
        }

        function getQuarterKeyFromMonthKey(monthKey) {
            const parsed = parseMonthKey(monthKey);
            if (!parsed) return '';
            return `${parsed.year}-Q${Math.floor((parsed.month - 1) / 3) + 1}`;
        }

        function getWeekMonthKeys(weekKey) {
            const startDate = getDateFromWeekKey(weekKey);
            if (!startDate) return [getCurrentMonthKey()];
            const monthKeys = [];
            for (let index = 0; index < 7; index += 1) {
                const cursor = new Date(startDate);
                cursor.setUTCDate(startDate.getUTCDate() + index);
                const monthKey = getMonthKeyFromDate(cursor);
                if (monthKey && !monthKeys.includes(monthKey)) monthKeys.push(monthKey);
            }

            return monthKeys;
        }

        function weekKeyTouchesMonth(weekKey, monthKey) {
            return getWeekMonthKeys(weekKey).includes(monthKey);
        }

        function getAvailableWeeklyBoardQuarterKeys() {
            return [...new Set(
                state.normalizedRows
                    .filter(row => row.period_type === 'month')
                    .map(row => getQuarterKeyFromMonthKey(row.period))
                    .filter(Boolean)
            )].sort((left, right) => right.localeCompare(left, 'zh-CN'));
        }

        function getAvailableWeeklyBoardMonthKeys(quarterKey = state.weeklyBoardQuarter) {
            return [...new Set(
                state.normalizedRows
                    .filter(row => row.period_type === 'month')
                    .map(row => row.period)
                    .filter(period => !quarterKey || getQuarterKeyFromMonthKey(period) === quarterKey)
            )].sort((left, right) => left.localeCompare(right, 'zh-CN'));
        }

        function getAllAvailableWeeklyBoardMonthKeys() {
            return getAvailableWeeklyBoardMonthKeys('');
        }

        function getAvailableWeeklyBoardWeekKeys(monthKey = state.weeklyBoardMonth) {
            const startDate = getDateFromMonthKey(monthKey);
            if (!startDate) return [getCurrentWeekKey()];
            const endDate = new Date(Date.UTC(startDate.getUTCFullYear(), startDate.getUTCMonth() + 1, 0));
            const weekKeys = [];
            const cursor = new Date(startDate);
            while (cursor.getTime() <= endDate.getTime()) {
                const { year, week } = getWeekInfo(cursor);
                const weekKey = `${year}-W${String(week).padStart(2, '0')}`;
                if (!weekKeys.includes(weekKey)) weekKeys.push(weekKey);
                cursor.setUTCDate(cursor.getUTCDate() + 1);
            }
            return weekKeys.sort(compareWeekKey);
        }

        function syncWeeklyBoardFromQuarter(quarterKey) {
            const safeQuarter = parseQuarterKey(quarterKey) ? quarterKey : getCurrentQuarterKey();
            state.weeklyBoardQuarter = safeQuarter;
            const monthOptions = getAvailableWeeklyBoardMonthKeys(safeQuarter);
            const currentMonth = getCurrentMonthKey();
            const nextMonth = monthOptions.includes(state.weeklyBoardMonth)
                ? state.weeklyBoardMonth
                : (monthOptions.includes(currentMonth) ? currentMonth : (monthOptions[0] || currentMonth));
            state.weeklyBoardMonth = nextMonth;
            const weekOptions = getAvailableWeeklyBoardWeekKeys(nextMonth);
            const currentWeek = getCurrentWeekKey();
            state.weeklyBoardWeek = weekOptions.includes(currentWeek)
                ? currentWeek
                : (weekOptions.includes(state.weeklyBoardWeek) ? state.weeklyBoardWeek : (weekOptions[0] || currentWeek));
        }

        function syncWeeklyBoardFromMonth(monthKey) {
            const safeMonth = parseMonthKey(monthKey) ? monthKey : getCurrentMonthKey();
            state.weeklyBoardMonth = safeMonth;
            state.weeklyBoardQuarter = getQuarterKeyFromMonthKey(safeMonth) || getCurrentQuarterKey();
            const weekOptions = getAvailableWeeklyBoardWeekKeys(safeMonth);
            const currentWeek = getCurrentWeekKey();
            if (weekOptions.includes(state.weeklyBoardWeek)) return;
            state.weeklyBoardWeek = weekOptions.includes(currentWeek) ? currentWeek : (weekOptions[0] || currentWeek);
        }

        function syncWeeklyBoardFromWeek(weekKey) {
            const safeWeek = parseWeekKey(weekKey) ? weekKey : getCurrentWeekKey();
            state.weeklyBoardWeek = safeWeek;
            const monthKeys = getWeekMonthKeys(safeWeek);
            const preferredMonth = monthKeys.includes(state.weeklyBoardMonth) ? state.weeklyBoardMonth : (monthKeys[0] || getCurrentMonthKey());
            state.weeklyBoardMonth = preferredMonth;
            state.weeklyBoardQuarter = getQuarterKeyFromMonthKey(preferredMonth) || getCurrentQuarterKey();
        }

        function getQuarterMonthKeys(quarterKey) {
            const startDate = getDateFromQuarterKey(quarterKey);
            if (!startDate) return [];
            return Array.from({ length: 3 }, (_, index) => {
                const cursor = new Date(startDate);
                cursor.setUTCMonth(startDate.getUTCMonth() + index);
                return `${cursor.getUTCFullYear()}-${String(cursor.getUTCMonth() + 1).padStart(2, '0')}`;
            });
        }

        function getWeeklyBoardTargetMonthKeys(mode, periodKey) {
            if (mode === 'quarter') return getQuarterMonthKeys(periodKey);
            if (mode === 'month') return [periodKey].filter(Boolean);
            return [state.weeklyBoardMonth || getCurrentMonthKey()].filter(Boolean);
        }

        function getWeekRangeDateKeys(weekKey) {
            const startDate = getDateFromWeekKey(weekKey);
            if (!startDate) return { startKey: '', endKey: '' };
            const endDate = new Date(startDate);
            endDate.setUTCDate(endDate.getUTCDate() + 6);
            const toKey = (date) => `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, '0')}-${String(date.getUTCDate()).padStart(2, '0')}`;
            return {
                startKey: toKey(startDate),
                endKey: toKey(endDate)
            };
        }

        function getWeeklyBoardRowScheduleRange(row) {
            const fallbackYear = (row.period || state.weeklyBoardMonth || '').split('-')[0] || String(new Date().getFullYear());
            const startKey = getPrimaryDateKey(row.start_time, fallbackYear);
            const actualKey = getPrimaryDateKey(row.actual_delivery_time, fallbackYear);
            const dueKey = getPrimaryDateKey(row.due_time, fallbackYear);
            const endKey = actualKey || dueKey;

            if (!startKey && !endKey) return { startKey: '', endKey: '' };
            if (!startKey) return { startKey: endKey, endKey };
            if (!endKey) return { startKey, endKey: startKey };
            return compareDateKey(startKey, endKey) <= 0
                ? { startKey, endKey }
                : { startKey: endKey, endKey: startKey };
        }

        function doesWeeklyBoardRowOverlapWeek(row, weekKey) {
            const { startKey: weekStartKey, endKey: weekEndKey } = getWeekRangeDateKeys(weekKey);
            const { startKey: rowStartKey, endKey: rowEndKey } = getWeeklyBoardRowScheduleRange(row);
            if (!weekStartKey || !weekEndKey || !rowStartKey || !rowEndKey) return false;
            return compareDateKey(rowEndKey, weekStartKey) >= 0 && compareDateKey(rowStartKey, weekEndKey) <= 0;
        }

        function getWeeklyBoardScopedRows(mode, periodKey) {
            const monthKeys = new Set(getWeeklyBoardTargetMonthKeys(mode, periodKey));
            return state.normalizedRows.filter(row => {
                if (row.period_type !== 'month') return false;
                if (!monthKeys.has(row.period)) return false;
                if (mode === 'week' && !doesWeeklyBoardRowOverlapWeek(row, periodKey)) return false;
                if (mode === 'quarter' && !(row.key_result_text || row.key_result)) return false;
                return true;
            });
        }

        function setWeeklyBoardSelection(mode, value) {
            if (mode === 'month') {
                state.weeklyBoardMonth = parseMonthKey(value) ? value : getCurrentMonthKey();
                return;
            }
            if (mode === 'quarter') {
                state.weeklyBoardQuarter = parseQuarterKey(value) ? value : getCurrentQuarterKey();
                return;
            }
            state.weeklyBoardWeek = parseWeekKey(value) ? value : getCurrentWeekKey();
        }

        function getPeriodStartDate(mode, periodKey) {
            if (mode === 'month') return getDateFromMonthKey(periodKey);
            if (mode === 'quarter') return getDateFromQuarterKey(periodKey);
            return getDateFromWeekKey(periodKey);
        }

        function getPeriodEndDate(mode, periodKey) {
            const startDate = getPeriodStartDate(mode, periodKey);
            if (!startDate) return null;
            const endDate = new Date(startDate);
            if (mode === 'month') {
                endDate.setUTCMonth(endDate.getUTCMonth() + 1, 0);
                return endDate;
            }
            if (mode === 'quarter') {
                endDate.setUTCMonth(endDate.getUTCMonth() + 3, 0);
                return endDate;
            }
            endDate.setUTCDate(endDate.getUTCDate() + 6);
            return endDate;
        }

        function shiftPeriodKey(mode, periodKey, offset) {
            if (mode === 'month') return shiftMonthKey(periodKey, offset);
            if (mode === 'quarter') return shiftQuarterKey(periodKey, offset);
            return shiftWeekKey(periodKey, offset);
        }

        function getPeriodLabel(mode, periodKey, options = {}) {
            const { short = false, trigger = false } = options;
            if (mode === 'month') return formatMonthLabel(periodKey, short);
            if (mode === 'quarter') return formatQuarterLabel(periodKey, short);
            return trigger ? formatWeekLabel(periodKey, true) : (short ? String(periodKey || '').replace(/^(\d{4})-W/, 'W') : formatWeekLabel(periodKey));
        }

        function getEntryReferenceDate(entry) {
            const snapshotDate = entry?.snapshot_at ? new Date(entry.snapshot_at) : null;
            if (snapshotDate instanceof Date && !Number.isNaN(snapshotDate.getTime())) {
                return new Date(Date.UTC(snapshotDate.getUTCFullYear(), snapshotDate.getUTCMonth(), snapshotDate.getUTCDate()));
            }
            return getDateFromWeekKey(entry?.weekKey || '');
        }

        function getPeriodKeyFromEntry(mode, entry) {
            if (mode === 'week') return entry?.weekKey || '';
            const date = getEntryReferenceDate(entry);
            if (!date) return '';
            if (mode === 'month') {
                return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, '0')}`;
            }
            return `${date.getUTCFullYear()}-Q${Math.floor(date.getUTCMonth() / 3) + 1}`;
        }

        function getPeriodYear(mode, periodKey) {
            if (mode === 'month') return parseMonthKey(periodKey)?.year || new Date().getFullYear();
            if (mode === 'quarter') return parseQuarterKey(periodKey)?.year || new Date().getFullYear();
            return parseWeekKey(periodKey)?.year || new Date().getFullYear();
        }

        function getRecentPeriodKeys(mode, anchorPeriodKey, count = 6) {
            const safeAnchor = anchorPeriodKey || getWeeklyBoardSelection(mode);
            const keys = [];
            for (let index = count - 1; index >= 0; index -= 1) {
                keys.push(shiftPeriodKey(mode, safeAnchor, -index));
            }
            return keys;
        }

        function loadWeeklyProgressEntries() {
            const preloaded = window.__departmentWeeklyProgressHistory?.tasks;
            return preloaded && typeof preloaded === 'object' ? preloaded : {};
        }

        function hashText(value, seed = 7) {
            return [...String(value || '')].reduce((accumulator, char) => ((accumulator * 33) + char.charCodeAt(0)) % 9973, seed);
        }

        function getWeeklyTaskVersionToken(row) {
            return String(row.version_no || '').trim();
        }

        function getWeeklyStableTaskIdentity(row) {
            return [
                row.period_type,
                row.period,
                row.raw_owner || row.person || '',
                row.product_line || '',
                row.objective_id || '',
                row.business_kr_id || row.business_kr || '',
                getWeeklyTaskVersionToken(row),
                row.task_type || ''
            ].map(value => String(value || '').trim());
        }

        function getWeeklyTaskKey(row) {
            const identity = getWeeklyStableTaskIdentity(row);
            const populatedCount = identity.filter(Boolean).length;
            if (populatedCount >= 4) {
                return identity.join('||');
            }

            return [
                ...identity,
                row.task || row.key_result_text || row.key_result || ''
            ].map(value => String(value || '').trim()).join('||');
        }

        function getWeeklyTaskEntryMap(taskKey) {
            return state.weeklyProgressEntries[taskKey] || {};
        }

        function getWeeklyTaskEntries(taskKey) {
            return Object.entries(getWeeklyTaskEntryMap(taskKey))
                .sort(([left], [right]) => compareWeekKey(left, right))
                .map(([weekKey, entry]) => ({ weekKey, ...entry }));
        }

        function getExplicitPeriodicEntry(taskKey, mode, periodKey) {
            const matches = getWeeklyTaskEntries(taskKey).filter(entry => getPeriodKeyFromEntry(mode, entry) === periodKey);
            if (!matches.length) return null;
            const latest = matches[matches.length - 1];
            return {
                ...latest,
                sourcePeriod: periodKey,
                isCarryForward: false
            };
        }

        function getResolvedPeriodicEntry(taskKey, mode, periodKey) {
            const explicit = getExplicitPeriodicEntry(taskKey, mode, periodKey);
            if (explicit) return explicit;
            const periodEnd = getPeriodEndDate(mode, periodKey);
            const candidate = getWeeklyTaskEntries(taskKey)
                .filter(entry => {
                    const referenceDate = getEntryReferenceDate(entry);
                    return referenceDate && periodEnd && referenceDate <= periodEnd;
                })
                .pop();
            if (!candidate) return null;
            const sourcePeriod = getPeriodKeyFromEntry(mode, candidate);
            return {
                ...candidate,
                sourcePeriod,
                isCarryForward: sourcePeriod !== periodKey
            };
        }

        function getPeriodicEffectiveProgress(row, mode, periodKey) {
            const resolved = getResolvedPeriodicEntry(getWeeklyTaskKey(row), mode, periodKey);
            return resolved ? resolved.progress : row.progress;
        }

        function getPeriodicEffectiveStatus(row, mode, periodKey) {
            const resolved = getResolvedPeriodicEntry(getWeeklyTaskKey(row), mode, periodKey);
            return resolved ? resolved.status : (row.status || '待开始');
        }

        function getPeriodCopy(mode) {
            return {
                week: { current: '本周', previous: '上周', currentRange: '周', previousRange: '上周', calculation: '周末值' },
                month: { current: '本月', previous: '上月', currentRange: '月', previousRange: '上月', calculation: '月末值' },
                quarter: { current: '本季度', previous: '上季度', currentRange: '季度', previousRange: '上季度', calculation: '季末值' }
            }[mode] || { current: '本周期', previous: '上周期', currentRange: '周期', previousRange: '上周期', calculation: '周期末值' };
        }

        function ensureWeeklyBoardPickerSelectionVisible() {
            requestAnimationFrame(() => {
                const activeOption = document.querySelector('.weekly-picker-option.is-active');
                if (!activeOption || typeof activeOption.scrollIntoView !== 'function') return;
                activeOption.scrollIntoView({ block: 'center', inline: 'nearest' });
            });
        }

        function changeWeeklyBoardFilter(key, value) {
            state[key] = value;
            renderPage(state.currentPage);
        }

        function toggleWeeklyBoardPicker() {
            state.weeklyBoardPickerOpen = !state.weeklyBoardPickerOpen;
            renderPage(state.currentPage);
            if (state.weeklyBoardPickerOpen) ensureWeeklyBoardPickerSelectionVisible();
        }

        function toggleWeeklyBoardDetails() {
            state.weeklyBoardDetailsExpanded = !state.weeklyBoardDetailsExpanded;
            renderPage(state.currentPage);
        }

        function changeWeeklyBoardQuarter(value) {
            state.weeklyBoardMode = 'quarter';
            syncWeeklyBoardFromQuarter(value);
            renderPage(state.currentPage);
        }

        function changeWeeklyBoardMonth(value) {
            if (value === WEEKLY_BOARD_ALL_VALUE) {
                state.weeklyBoardMode = 'quarter';
                syncWeeklyBoardFromQuarter(state.weeklyBoardQuarter);
                renderPage(state.currentPage);
                return;
            }
            state.weeklyBoardMode = 'month';
            syncWeeklyBoardFromMonth(value);
            renderPage(state.currentPage);
        }

        function changeWeeklyBoardWeek(value) {
            if (value === WEEKLY_BOARD_ALL_VALUE) {
                state.weeklyBoardMode = 'month';
                syncWeeklyBoardFromMonth(state.weeklyBoardMonth);
                renderPage(state.currentPage);
                return;
            }
            state.weeklyBoardMode = 'week';
            syncWeeklyBoardFromWeek(value);
            renderPage(state.currentPage);
        }

        function shiftWeeklyBoardWeek(offset) {
            const currentWeek = getWeeklyBoardSelection('week');
            const nextWeek = shiftWeekKey(currentWeek, offset);
            syncWeeklyBoardFromWeek(nextWeek);
            state.weeklyBoardPickerYear = getPeriodYear('week', nextWeek);
            renderPage(state.currentPage);
        }

        function setWeeklyBoardMode(mode) {
            state.weeklyBoardMode = ['week', 'month', 'quarter'].includes(mode) ? mode : 'week';
            if (state.weeklyBoardMode === 'quarter') syncWeeklyBoardFromQuarter(state.weeklyBoardQuarter);
            if (state.weeklyBoardMode === 'month') syncWeeklyBoardFromMonth(state.weeklyBoardMonth);
            if (state.weeklyBoardMode === 'week') syncWeeklyBoardFromWeek(state.weeklyBoardWeek);
            state.weeklyBoardPickerYear = getPeriodYear(state.weeklyBoardMode, getWeeklyBoardSelection(state.weeklyBoardMode));
            renderPage(state.currentPage);
            if (state.weeklyBoardPickerOpen) ensureWeeklyBoardPickerSelectionVisible();
        }

        function selectWeeklyBoardPeriod(periodKey) {
            setWeeklyBoardSelection(state.weeklyBoardMode, periodKey);
            state.weeklyBoardPickerOpen = false;
            state.weeklyBoardPickerYear = getPeriodYear(state.weeklyBoardMode, periodKey);
            renderPage(state.currentPage);
        }

        function shiftWeeklyBoardPeriod(offset) {
            const mode = state.weeklyBoardMode;
            const currentSelection = getWeeklyBoardSelection(mode);
            const nextSelection = shiftPeriodKey(mode, currentSelection, offset);
            if (mode === 'quarter') syncWeeklyBoardFromQuarter(nextSelection);
            if (mode === 'month') syncWeeklyBoardFromMonth(nextSelection);
            if (mode === 'week') syncWeeklyBoardFromWeek(nextSelection);
            state.weeklyBoardPickerYear = getPeriodYear(mode, nextSelection);
            renderPage(state.currentPage);
        }

        function shiftWeeklyBoardPickerYear(offset) {
            state.weeklyBoardPickerYear += offset;
            renderPage(state.currentPage);
            if (state.weeklyBoardPickerOpen) ensureWeeklyBoardPickerSelectionVisible();
        }

        function getWeeklyBoardFilterOptions(rows, mode, periodKey) {
            const members = ['all', ...new Set(rows.map(row => row.raw_owner || row.person).filter(Boolean))];
            const productsBase = rows.filter(row => {
                if (state.weeklyBoardMember !== 'all' && (row.raw_owner || row.person) !== state.weeklyBoardMember) return false;
                if (state.weeklyBoardStatus !== 'all' && getPeriodicEffectiveStatus(row, mode, periodKey) !== state.weeklyBoardStatus) return false;
                return true;
            });
            const products = ['all', ...[...new Set(productsBase.map(row => row.product_line).filter(Boolean))].sort((left, right) => {
                const leftIndex = PRODUCT_ORDER.indexOf(left);
                const rightIndex = PRODUCT_ORDER.indexOf(right);
                return (leftIndex === -1 ? 999 : leftIndex) - (rightIndex === -1 ? 999 : rightIndex);
            })];
            const statusesBase = rows.filter(row => {
                if (state.weeklyBoardMember !== 'all' && (row.raw_owner || row.person) !== state.weeklyBoardMember) return false;
                if (state.weeklyBoardProduct !== 'all' && row.product_line !== state.weeklyBoardProduct) return false;
                return true;
            });
            const statuses = ['all', ...new Set(statusesBase.map(row => getPeriodicEffectiveStatus(row, mode, periodKey)).filter(Boolean))];
            return { members, products, statuses };
        }

        function applyWeeklyBoardFilters(rows, mode, periodKey) {
            return rows.filter(row => {
                if (state.weeklyBoardMember !== 'all' && (row.raw_owner || row.person) !== state.weeklyBoardMember) return false;
                if (state.weeklyBoardProduct !== 'all' && row.product_line !== state.weeklyBoardProduct) return false;
                if (state.weeklyBoardStatus !== 'all' && getPeriodicEffectiveStatus(row, mode, periodKey) !== state.weeklyBoardStatus) return false;
                return true;
            });
        }

        function getYearWeekOptions(year) {
            return Array.from({ length: 53 }, (_, index) => `${year}-W${String(index + 1).padStart(2, '0')}`)
                .filter(weekKey => {
                    const weekDate = getDateFromWeekKey(weekKey);
                    if (!weekDate) return false;
                    const info = getWeekInfo(weekDate);
                    return info.year === year && info.week === Number(weekKey.slice(-2));
                });
        }

        function renderWeeklyPeriodPicker(mode, selectionKey) {
            const year = state.weeklyBoardPickerYear;
            const modeTabs = [
                { value: 'week', label: '周' },
                { value: 'month', label: '月' },
                { value: 'quarter', label: '季度' }
            ];

            let options = [];
            let gridClass = 'weeks';
            if (mode === 'month') {
                gridClass = 'months';
                options = Array.from({ length: 12 }, (_, index) => {
                    const key = `${year}-${String(index + 1).padStart(2, '0')}`;
                    return { key, main: `${index + 1}月`, sub: formatMonthLabel(key) };
                });
            } else if (mode === 'quarter') {
                gridClass = 'quarters';
                options = Array.from({ length: 4 }, (_, index) => {
                    const key = `${year}-Q${index + 1}`;
                    return { key, main: `第 ${index + 1} 季度`, sub: `${year} 年 Q${index + 1}` };
                });
            } else {
                options = getYearWeekOptions(year).map(key => ({
                    key,
                    main: key.replace(/^(\d{4})-W/, 'W'),
                    sub: formatWeekLabel(key, true)
                }));
            }

            return `
                <div class="weekly-picker-popover">
                    <div class="weekly-picker-tabs">
                        ${modeTabs.map(tab => `<button class="weekly-picker-tab ${tab.value === mode ? 'is-active' : ''}" type="button" onclick="setWeeklyBoardMode('${tab.value}')">${tab.label}</button>`).join('')}
                    </div>
                    <div class="weekly-picker-header">
                        <div class="weekly-picker-year-title">${year}年</div>
                        <div class="weekly-picker-year-nav">
                            <button class="weekly-picker-year-btn" type="button" onclick="shiftWeeklyBoardPickerYear(-1)">‹</button>
                            <button class="weekly-picker-year-btn" type="button" onclick="shiftWeeklyBoardPickerYear(1)">›</button>
                        </div>
                    </div>
                    <div class="weekly-picker-scroll">
                        <div class="weekly-picker-grid ${gridClass}">
                            ${options.map(option => `
                                <button class="weekly-picker-option ${option.key === selectionKey ? 'is-active' : ''}" type="button" data-period-key="${option.key}" onclick="selectWeeklyBoardPeriod('${option.key}')">
                                    <span class="weekly-picker-option-main">${escapeHtml(option.main)}</span>
                                    <span class="weekly-picker-option-sub">${escapeHtml(option.sub)}</span>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderWeeklyBoardFilters(rows, mode, periodKey) {
            const options = getWeeklyBoardFilterOptions(rows, mode, periodKey);
            const quarterOptions = getAvailableWeeklyBoardQuarterKeys();
            const monthOptions = getAllAvailableWeeklyBoardMonthKeys();
            const weekOptions = getAvailableWeeklyBoardWeekKeys(state.weeklyBoardMonth);
            const makeOptions = (items, current, allLabel) => items.map(item => {
                const value = item === 'all' ? 'all' : item;
                const label = item === 'all' ? allLabel : item;
                return `<option value="${value}" ${current === value ? 'selected' : ''}>${label}</option>`;
            }).join('');
            const detailToggleLabel = state.weeklyBoardDetailsExpanded ? '收起进度明细' : '展开进度明细';
            const detailToggleClass = state.weeklyBoardDetailsExpanded ? 'weekly-detail-toggle is-on' : 'weekly-detail-toggle';

            return `
                <div class="scope-filter-panel weekly-filter-panel">
                    <div class="weekly-filter-stack">
                        <div class="weekly-time-toolbar">
                            <button class="weekly-shift-btn" type="button" onclick="shiftWeeklyBoardWeek(-1)" aria-label="上一周">‹</button>
                            <div class="weekly-linked-periods">
                                <div class="weekly-linked-field ${mode === 'quarter' ? 'is-active' : ''}">
                                    <button class="weekly-linked-label" type="button" onclick="setWeeklyBoardMode('quarter')">季度</button>
                                    <select class="weekly-linked-select" onchange="changeWeeklyBoardQuarter(this.value)">
                                        ${quarterOptions.map(option => `<option value="${option}" ${state.weeklyBoardQuarter === option ? 'selected' : ''}>${escapeHtml(formatQuarterLabel(option))}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="weekly-linked-field ${mode === 'month' ? 'is-active' : ''}">
                                    <button class="weekly-linked-label" type="button" onclick="setWeeklyBoardMode('month')">月</button>
                                    <select class="weekly-linked-select" onchange="changeWeeklyBoardMonth(this.value)">
                                        <option value="${WEEKLY_BOARD_ALL_VALUE}" ${mode === 'quarter' ? 'selected' : ''}>全部</option>
                                        ${monthOptions.map(option => `<option value="${option}" ${mode !== 'quarter' && state.weeklyBoardMonth === option ? 'selected' : ''}>${escapeHtml(formatMonthLabel(option))}</option>`).join('')}
                                    </select>
                                </div>
                                <div class="weekly-linked-field ${mode === 'week' ? 'is-active' : ''}">
                                    <button class="weekly-linked-label" type="button" onclick="setWeeklyBoardMode('week')">周</button>
                                    <select class="weekly-linked-select" onchange="changeWeeklyBoardWeek(this.value)">
                                        <option value="${WEEKLY_BOARD_ALL_VALUE}" ${mode !== 'week' ? 'selected' : ''}>全部</option>
                                        ${weekOptions.map(option => `<option value="${option}" ${mode === 'week' && state.weeklyBoardWeek === option ? 'selected' : ''}>${escapeHtml(formatWeekLabel(option, true))}</option>`).join('')}
                                    </select>
                                </div>
                            </div>
                            <button class="weekly-shift-btn" type="button" onclick="shiftWeeklyBoardWeek(1)" aria-label="下一周">›</button>
                        </div>
                        <div class="weekly-filter-bar">
                            <select class="scope-filter-select" onchange="changeWeeklyBoardFilter('weeklyBoardMember', this.value)">
                                ${makeOptions(options.members, state.weeklyBoardMember, '所有成员')}
                            </select>
                            <select class="scope-filter-select" onchange="changeWeeklyBoardFilter('weeklyBoardProduct', this.value)">
                                ${makeOptions(options.products, state.weeklyBoardProduct, '所有产品')}
                            </select>
                            <select class="scope-filter-select" onchange="changeWeeklyBoardFilter('weeklyBoardStatus', this.value)">
                                ${makeOptions(options.statuses, state.weeklyBoardStatus, '所有状态')}
                            </select>
                            <button class="${detailToggleClass}" type="button" aria-pressed="${state.weeklyBoardDetailsExpanded ? 'true' : 'false'}" onclick="toggleWeeklyBoardDetails()">
                                <span class="weekly-detail-toggle-switch" aria-hidden="true"></span>
                                <span class="weekly-detail-toggle-label">${detailToggleLabel}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderWeeklyTrendSummary(rows, mode, periodKey) {
            const previousPeriodKey = shiftPeriodKey(mode, periodKey, -1);
            const updatedThisPeriod = rows.filter(row => getExplicitPeriodicEntry(getWeeklyTaskKey(row), mode, periodKey)).length;
            const changedTasks = rows.filter(row => getPeriodicEffectiveProgress(row, mode, periodKey) !== getPeriodicEffectiveProgress(row, mode, previousPeriodKey)).length;
            const avgProgress = rows.length ? Math.round(rows.reduce((sum, row) => sum + getPeriodicEffectiveProgress(row, mode, periodKey), 0) / rows.length) : 0;
            const avgDelta = rows.length ? Math.round(rows.reduce((sum, row) => sum + (getPeriodicEffectiveProgress(row, mode, periodKey) - getPeriodicEffectiveProgress(row, mode, previousPeriodKey)), 0) / rows.length) : 0;
            const carryForwardCount = rows.filter(row => {
                const resolved = getResolvedPeriodicEntry(getWeeklyTaskKey(row), mode, periodKey);
                return resolved && resolved.isCarryForward;
            }).length;
            const copy = getPeriodCopy(mode);

            return `
                <div class="weekly-summary-grid">
                    <div class="insight-card weekly-insight-card">
                        <div class="insight-eyebrow">当前周期</div>
                        <div class="insight-value">${escapeHtml(getPeriodLabel(mode, periodKey))}</div>
                        <div class="insight-note">当前按${copy.currentRange}查看同一版本的推进节奏。</div>
                    </div>
                    <div class="insight-card weekly-insight-card">
                        <div class="insight-eyebrow">周期内有更新</div>
                        <div class="insight-value">${updatedThisPeriod}</div>
                        <div class="insight-note">当前${copy.currentRange}内存在显式快照的任务数。</div>
                    </div>
                    <div class="insight-card weekly-insight-card">
                        <div class="insight-eyebrow">进度变化</div>
                        <div class="insight-value">${changedTasks}</div>
                        <div class="insight-note">相较${copy.previousRange}有进度变化的任务数。</div>
                    </div>
                    <div class="insight-card weekly-insight-card">
                        <div class="insight-eyebrow">平均进度</div>
                        <div class="insight-value">${avgProgress}%</div>
                        <div class="insight-note">相较${copy.previousRange} ${avgDelta >= 0 ? '+' : ''}${avgDelta}% 。</div>
                    </div>
                    <div class="insight-card weekly-insight-card">
                        <div class="insight-eyebrow">沿用上次记录</div>
                        <div class="insight-value">${carryForwardCount}</div>
                        <div class="insight-note">当前${copy.currentRange}未新增快照，沿用更早周期末值。</div>
                    </div>
                </div>
            `;
        }

        function renderWeeklyTimeline(row, mode, periodKey) {
            const periodKeys = getRecentPeriodKeys(mode, periodKey, mode === 'week' ? 4 : 3);
            const taskKey = getWeeklyTaskKey(row);
            return `
                <div class="weekly-timeline">
                    ${periodKeys.map(key => {
                        const resolved = getResolvedPeriodicEntry(taskKey, mode, key);
                        const progress = resolved ? resolved.progress : null;
                        const isSelected = key === periodKey;
                        const modeClass = !resolved ? 'is-empty' : (resolved.isCarryForward ? 'is-carried' : 'is-recorded');
                        return `
                            <div class="weekly-timeline-chip ${modeClass} ${isSelected ? 'is-selected' : ''}">
                                <span class="weekly-timeline-label">${escapeHtml(getPeriodLabel(mode, key, { short: true }))}</span>
                                <span class="weekly-timeline-value">${progress === null ? '—' : `${progress}%`}</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderWeeklyProgressPill(label, progress) {
            return `<span class="weekly-period-progress">${escapeHtml(label)} <strong>${Number.isFinite(progress) ? `${progress}%` : '—'}</strong></span>`;
        }

        function hasMeaningfulWeeklyVersionLabel(label) {
            const normalized = String(label || '').trim();
            return normalized && normalized !== '未填写版本号';
        }

        function buildWeeklyVersionGroups(rows, mode, periodKey) {
            const groups = rows.reduce((accumulator, row) => {
                const versionLabel = String(row.version_no || '').trim() || '未填写版本号';
                const groupKey = [row.product_line || '', versionLabel].join('||');
                if (!accumulator[groupKey]) {
                    accumulator[groupKey] = {
                        key: groupKey,
                        product: row.product_line || '未归类产品',
                        versionLabel,
                        rows: []
                    };
                }
                accumulator[groupKey].rows.push(row);
                return accumulator;
            }, {});

            return Object.values(groups)
                .map(group => {
                    const avgProgress = group.rows.length
                        ? Math.round(group.rows.reduce((sum, row) => sum + getPeriodicEffectiveProgress(row, mode, periodKey), 0) / group.rows.length)
                        : 0;
                    const previousPeriod = shiftPeriodKey(mode, periodKey, -1);
                    const previousAvgProgress = group.rows.length
                        ? Math.round(group.rows.reduce((sum, row) => sum + getPeriodicEffectiveProgress(row, mode, previousPeriod), 0) / group.rows.length)
                        : 0;
                    const owners = [...new Set(group.rows.map(row => row.raw_owner || row.person).filter(Boolean))];
                    return {
                        ...group,
                        avgProgress,
                        progressDelta: avgProgress - previousAvgProgress,
                        owners,
                        hasVersionNo: hasMeaningfulWeeklyVersionLabel(group.versionLabel)
                    };
                })
                .sort((left, right) => {
                    if (left.hasVersionNo !== right.hasVersionNo) return left.hasVersionNo ? -1 : 1;
                    const leftIndex = PRODUCT_ORDER.indexOf(left.product);
                    const rightIndex = PRODUCT_ORDER.indexOf(right.product);
                    const safeLeft = leftIndex === -1 ? 999 : leftIndex;
                    const safeRight = rightIndex === -1 ? 999 : rightIndex;
                    if (safeLeft !== safeRight) return safeLeft - safeRight;
                    return left.versionLabel.localeCompare(right.versionLabel, 'zh-CN');
                });
        }

        function formatWeeklyTaskDateLabel(dateKey) {
            if (!dateKey) return '';
            const parsed = new Date(`${dateKey}T00:00:00`);
            if (Number.isNaN(parsed.getTime())) return dateKey;
            return `${parsed.getMonth() + 1}月${parsed.getDate()}日`;
        }

        function getWeeklyTaskCompletionTiming(actualKey, dueKey) {
            if (!actualKey || !dueKey) return null;
            const compareResult = compareDateKey(actualKey, dueKey);
            if (compareResult < 0) {
                return { label: '提前完成', className: 'is-early' };
            }
            if (compareResult > 0) {
                return { label: '延期完成', className: 'is-delay' };
            }
            return { label: '按时完成', className: 'is-on-time' };
        }

        function renderWeeklyTaskScheduleLabel(row) {
            const fallbackYear = (row.period || state.weeklyBoardMonth || '').split('-')[0] || String(new Date().getFullYear());
            const startKey = getPrimaryDateKey(row.start_time, fallbackYear);
            const dueKey = getPrimaryDateKey(row.due_time, fallbackYear);
            const actualKey = getPrimaryDateKey(row.actual_delivery_time, fallbackYear);
            const segments = [];

            if (startKey && dueKey) {
                segments.push(`开始 ${formatWeeklyTaskDateLabel(startKey)} - 规定完成 ${formatWeeklyTaskDateLabel(dueKey)}`);
            } else if (startKey) {
                segments.push(`开始 ${formatWeeklyTaskDateLabel(startKey)}`);
            } else if (dueKey) {
                segments.push(`规定完成 ${formatWeeklyTaskDateLabel(dueKey)}`);
            } else {
                segments.push('未填写开始时间 / 规定完成时间');
            }

            if (actualKey) {
                segments.push(`实际完成 ${formatWeeklyTaskDateLabel(actualKey)}`);
            }

            const timing = getWeeklyTaskCompletionTiming(actualKey, dueKey);
            const timingHtml = timing
                ? `<span class="weekly-task-row-subline-status ${timing.className}">${escapeHtml(timing.label)}</span>`
                : '';

            return `<span class="weekly-task-row-subline-text">${escapeHtml(segments.join(' · '))}</span>${timingHtml}`;
        }

        function renderWeeklyTaskRow(row, mode, periodKey) {
            const previousPeriodKey = shiftPeriodKey(mode, periodKey, -1);
            const currentProgress = getPeriodicEffectiveProgress(row, mode, periodKey);
            const previousProgress = getPeriodicEffectiveProgress(row, mode, previousPeriodKey);
            const copy = getPeriodCopy(mode);
            const effectiveStatus = getPeriodicEffectiveStatus(row, mode, periodKey);
            const scheduleLabel = renderWeeklyTaskScheduleLabel(row);
            const statusMeta = {
                ...row,
                status: effectiveStatus,
                progress: currentProgress
            };

            return `
                <section class="weekly-task-row">
                    <div class="weekly-task-row-head">
                        <div class="weekly-task-row-main">
                            <div class="weekly-task-row-title">${escapeHtml(`${row.raw_owner || row.person || '未分配'} · ${row.key_result_text || row.key_result || row.task || '未命名任务'}`)}</div>
                        </div>
                        <div class="weekly-task-row-meta">
                            <div class="weekly-task-row-subline">${scheduleLabel}</div>
                            <span class="weekly-task-status-pill sheet-status-pill ${getStatusClass(statusMeta)}">${escapeHtml(effectiveStatus || row.status || '待开始')}</span>
                            ${renderWeeklyProgressPill(copy.previous, previousProgress)}
                            ${renderWeeklyProgressPill(copy.current, currentProgress)}
                        </div>
                    </div>
                    ${state.weeklyBoardDetailsExpanded ? renderWeeklyTimeline(row, mode, periodKey) : ''}
                </section>
            `;
        }

        function renderWeeklyVersionCard(group, mode, periodKey) {
            return `
                <section class="weekly-task-card ${getProductToneClass(group.product)}">
                    <div class="weekly-task-card-head">
                        <div>
                            <div class="weekly-task-card-title"><span class="weekly-version-chip ${getVersionToneClass(group.product)}" style="${getVersionToneStyle(group.versionLabel, group.product)}">${escapeHtml(group.versionLabel)}</span></div>
                        </div>
                    </div>
                    <div class="weekly-task-stack">
                        ${group.rows.map(row => renderWeeklyTaskRow(row, mode, periodKey)).join('')}
                    </div>
                </section>
            `;
        }

        function renderWeeklyTaskList(rows, mode, periodKey) {
            if (!rows.length) {
                return '<div class="empty-state">当前筛选条件下没有任务，调整成员、产品或状态后会自动刷新。</div>';
            }

            const versionGroups = buildWeeklyVersionGroups(rows, mode, periodKey);

            return `
                <div class="weekly-task-grid">
                    ${versionGroups.map(group => renderWeeklyVersionCard(group, mode, periodKey)).join('')}
                </div>
            `;
        }

        function getCurrentPeriod() {
            return state.filterPeriodType === 'month' ? state.filterMonth : state.filterQuarter;
        }

        function getPeriodData(rows) {
            const period = getCurrentPeriod();
            return rows.filter(row => row.period_type === state.filterPeriodType && row.period === period);
        }

        function getScopeConfig(pageId) {
            if (pageId === 'pdf-line-overview') {
                return {
                    icon: '▣',
                    title: 'PDF业务线看板',
                    subtitle: 'PDF业务线管理 · 聚焦 PDF Reader Pro、LynxPDF、UWP 的版本与任务',
                    rows: getPeriodData(state.normalizedRows.filter(row => getBusinessLine(row) === 'PDF业务线'))
                };
            }

            if (pageId === 'zalist-overview') {
                return {
                    icon: '◧',
                    title: '专案组',
                    subtitle: '产品经理视角 · 按产品横向切换查看版本与任务',
                    rows: getPeriodData(state.normalizedRows.filter(row => {
                        const member = state.members.find(item => item.name === row.person);
                        return member && member.group === '专案组';
                    }))
                };
            }

            if (pageId === 'design-overview') {
                return {
                    icon: '◨',
                    title: '设计组',
                    subtitle: '设计执行视角 · 横向查看各产品阶段版本与任务',
                    rows: getPeriodData(state.normalizedRows.filter(row => {
                        const member = state.members.find(item => item.name === row.person);
                        return member && member.group === '设计组';
                    }))
                };
            }

            if (pageId.startsWith('person-')) {
                const idx = parseInt(pageId.split('-')[1], 10);
                const member = state.members[idx];
                const meta = state.memberMeta[member.name] || { group: '', products: [] };
                return {
                    icon: member.name.slice(0, 1),
                    title: `${member.name} · 成员明细`,
                    subtitle: `${meta.group} / 成员明细 · 负责产品：${(meta.products || []).join(' / ') || '待补充'}`,
                    rows: getPeriodData(state.normalizedRows.filter(row => row.person === member.name))
                };
            }

            return {
                icon: '◫',
                title: '部门概览',
                subtitle: '产品设计部 · 横向查看每个产品当前阶段的版本与任务',
                rows: getPeriodData(state.normalizedRows)
            };
        }

        function cleanVersionLabel(label) {
            return label.replace(/\s+/g, ' ').replace(/-v/g, ' v').trim();
        }

        function deriveTrackLabel(row) {
            const source = [row.task, row.key_result, row.note].filter(Boolean).join(' / ');
            const patterns = [
                /(UWP[- ]?v\d+(?:\.\d+){0,2})/i,
                /(iOS\s*v\d+(?:\.\d+){0,2})/i,
                /(web\s*[- ]?v\d+(?:\.\d+){0,2})/i,
                /((?:LynxPDF|PDF Reader Pro|ComPDF AI|ComPDF|Web SDK|Server SDK|PC SDK|运营后台|会员系统|工单系统|官网)?[- ]?v\d+(?:\.\d+){0,2})/i,
                /(v\d+(?:\.\d+){0,2})/i
            ];

            for (const pattern of patterns) {
                const match = source.match(pattern);
                if (match) return cleanVersionLabel(match[1]);
            }

            if (/数据看板/.test(source)) return '数据看板';
            if (/标签/.test(source)) return '标签体系';
            if (/营收增长|增长策略|本地化/.test(source)) return '增长策略';
            if (/运营中台/.test(source)) return '运营中台';
            if (/OEM/.test(source)) return 'OEM 支撑中台';
            if (/AI\s*重写|小 APP/.test(source)) return 'AI 小应用';
            if (/官网/.test(source)) return '官网专项';

            return row.task
                .replace(/^【[^】]+】/, '')
                .replace(/完成|规划|设计|上线|复盘|外审|内审|验收|搭建/g, '')
                .trim()
                .slice(0, 18) || '其他任务';
        }

        function sortProducts(productNames) {
            return [...productNames].sort((left, right) => {
                const leftIndex = PRODUCT_ORDER.indexOf(left);
                const rightIndex = PRODUCT_ORDER.indexOf(right);
                const safeLeft = leftIndex === -1 ? PRODUCT_ORDER.length : leftIndex;
                const safeRight = rightIndex === -1 ? PRODUCT_ORDER.length : rightIndex;
                if (safeLeft !== safeRight) return safeLeft - safeRight;
                return left.localeCompare(right, 'zh-CN');
            });
        }

        function buildProductGroups(rows) {
            const products = {};

            rows.forEach(row => {
                const productName = normalizeProduct(row.product_line);
                const trackLabel = deriveTrackLabel(row);
                if (!products[productName]) products[productName] = {};
                if (!products[productName][trackLabel]) products[productName][trackLabel] = [];
                products[productName][trackLabel].push(row);
            });

            return sortProducts(Object.keys(products)).map(productName => {
                const versionMap = products[productName];
                const versions = Object.keys(versionMap)
                    .map(versionName => {
                        const rowsInVersion = versionMap[versionName];
                        const owners = [...new Set(rowsInVersion.map(row => row.person))];
                        const avgProgress = Math.round(rowsInVersion.reduce((sum, row) => sum + row.progress, 0) / rowsInVersion.length);
                        return {
                            name: versionName,
                            rows: rowsInVersion,
                            owners,
                            avgProgress,
                            completed: rowsInVersion.filter(row => row.progress >= 100 || row.status === '已完成').length,
                            isVersionLike: /v\d/i.test(versionName)
                        };
                    })
                    .sort((left, right) => {
                        if (left.isVersionLike !== right.isVersionLike) return left.isVersionLike ? -1 : 1;
                        return left.name.localeCompare(right.name, 'zh-CN');
                    });

                return {
                    name: productName,
                    rows: versions.flatMap(version => version.rows),
                    versions
                };
            });
        }

        function ensureSelectedProduct(pageId, productGroups) {
            const productNames = productGroups.map(group => group.name);
            if (!productNames.length) return '';
            if (!state.productSelection[pageId] || !productNames.includes(state.productSelection[pageId])) {
                state.productSelection[pageId] = productNames[0];
            }
            return state.productSelection[pageId];
        }

        function selectProductTab(pageId, productName) {
            state.productSelection[pageId] = productName;
            renderPage(pageId);
        }

        function changePeriodType(type) {
            state.filterPeriodType = type;
            renderPage(state.currentPage);
        }

        function changeMonth(month) {
            state.filterMonth = month;
            renderPage(state.currentPage);
        }

        function changeQuarter(quarter) {
            state.filterQuarter = quarter;
            renderPage(state.currentPage);
        }

        function selectPeriod(type, value) {
            state.filterPeriodType = type;
            if (type === 'month') {
                state.filterMonth = value;
            } else {
                state.filterQuarter = value;
            }
            renderPage(state.currentPage);
        }

        function renderFilterPanel() {
            const monthRows = state.normalizedRows.filter(row => row.period_type === 'month');
            const quarterRows = state.normalizedRows.filter(row => row.period_type === 'quarter');
            const months = [...new Set(monthRows.map(row => row.period))].sort().reverse();
            const quarters = [...new Set(quarterRows.map(row => row.period))].sort().reverse();
            const periodTabs = [
                ...quarters.map(quarter => ({ type: 'quarter', value: quarter })),
                ...months.map(month => ({ type: 'month', value: month }))
            ];

            return `
                <div class="filter-panel">
                    ${periodTabs.map(tab => {
                        const active = state.filterPeriodType === tab.type && (tab.type === 'month' ? state.filterMonth === tab.value : state.filterQuarter === tab.value);
                        return `<button class="filter-tab ${active ? 'active' : ''}" type="button" onclick="selectPeriod('${tab.type}', '${tab.value}')">${tab.value}</button>`;
                    }).join('')}
                </div>
            `;
        }

        function getAvailableMonths() {
            return [...new Set(state.normalizedRows.filter(row => row.period_type === 'month').map(row => row.period))].sort().reverse();
        }

        function ensureCalendarMonth() {
            const months = getAvailableMonths();
            if (!months.length) return '';
            if (!state.calendarMonth || !months.includes(state.calendarMonth)) {
                state.calendarMonth = months[0];
            }
            return state.calendarMonth;
        }

        function changeCalendarMonth(month) {
            state.calendarMonth = month;
            renderPage(state.currentPage);
        }

        function changeCalendarFilter(key, value) {
            state[key] = value;
            if (key === 'calendarFilterGroup' && value !== 'all') {
                const selectedMember = state.calendarFilterMember;
                const memberMeta = state.members.find(member => member.name === selectedMember);
                if (selectedMember !== 'all' && (!memberMeta || memberMeta.group !== value)) {
                    state.calendarFilterMember = 'all';
                }
            }
            renderPage(state.currentPage);
        }

        function changeCalendarMode(mode) {
            state.calendarMode = mode;
            renderPage(state.currentPage);
        }

        function parseCalendarDates(value, fallbackYear = '') {
            const text = String(value || '').replace(/\s+/g, ' ').trim();
            if (!text) return [];
            const found = [];
            const addDate = (year, month, day) => {
                const safeYear = Number(year);
                const safeMonth = Number(month);
                const safeDay = Number(day);
                if (!safeYear || safeMonth < 1 || safeMonth > 12 || safeDay < 1 || safeDay > 31) return;
                const parsed = new Date(safeYear, safeMonth - 1, safeDay);
                if (parsed.getFullYear() !== safeYear || parsed.getMonth() !== safeMonth - 1 || parsed.getDate() !== safeDay) return;
                found.push(`${safeYear}-${String(safeMonth).padStart(2, '0')}-${String(safeDay).padStart(2, '0')}`);
            };

            const fullDateRegex = /(\d{4})\s*[年./-]\s*(\d{1,2})\s*[月./-]\s*(\d{1,2})/g;
            let match = fullDateRegex.exec(text);
            while (match) {
                addDate(match[1], match[2], match[3]);
                match = fullDateRegex.exec(text);
            }

            const year = fallbackYear || String(new Date().getFullYear());
            const shortDateRegex = /(^|[^\d])(\d{1,2})\s*[月./-]\s*(\d{1,2})\s*[日号]?/g;
            match = shortDateRegex.exec(text);
            while (match) {
                addDate(year, match[2], match[3]);
                match = shortDateRegex.exec(text);
            }

            return [...new Set(found)].sort((left, right) => left.localeCompare(right, 'zh-CN'));
        }

        function getPrimaryDateKey(value, fallbackYear = '') {
            return parseCalendarDates(value, fallbackYear)[0] || '';
        }

        function compareDateKey(left, right) {
            if (!left || !right) return 0;
            const leftDate = new Date(`${left}T00:00:00`);
            const rightDate = new Date(`${right}T00:00:00`);
            return leftDate.getTime() - rightDate.getTime();
        }

        function buildDateRange(startKey, endKey, monthKey) {
            if (!startKey && !endKey) return [];
            if (!startKey) return endKey.startsWith(`${monthKey}-`) ? [endKey] : [];
            if (!endKey) return startKey.startsWith(`${monthKey}-`) ? [startKey] : [];

            let rangeStart = startKey;
            let rangeEnd = endKey;
            if (compareDateKey(rangeStart, rangeEnd) > 0) {
                rangeStart = endKey;
                rangeEnd = startKey;
            }

            const result = [];
            let cursor = new Date(`${rangeStart}T00:00:00`);
            const endDate = new Date(`${rangeEnd}T00:00:00`);
            while (cursor.getTime() <= endDate.getTime()) {
                const cursorKey = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}-${String(cursor.getDate()).padStart(2, '0')}`;
                if (cursorKey.startsWith(`${monthKey}-`)) result.push(cursorKey);
                cursor.setDate(cursor.getDate() + 1);
            }
            return result;
        }

        function getCalendarDateMeta(row, monthKey) {
            const fallbackYear = (row.period || monthKey || '').split('-')[0] || String(new Date().getFullYear());
            const plannedDate = getPrimaryDateKey(row.due_time, fallbackYear);
            const actualDate = getPrimaryDateKey(row.actual_delivery_time, fallbackYear);
            const startDate = getPrimaryDateKey(row.start_time, fallbackYear);

            if (state.calendarMode === 'planned') {
                return plannedDate && plannedDate.startsWith(`${monthKey}-`) ? [{ date: plannedDate, source: 'due' }] : [];
            }

            if (state.calendarMode === 'actual') {
                return actualDate && actualDate.startsWith(`${monthKey}-`) ? [{ date: actualDate, source: 'actual' }] : [];
            }

            const rangeDates = buildDateRange(startDate, plannedDate || actualDate, monthKey);
            if (rangeDates.length) {
                return rangeDates.map(date => ({ date, source: 'range' }));
            }

            if (plannedDate && plannedDate.startsWith(`${monthKey}-`)) return [{ date: plannedDate, source: 'due' }];
            if (actualDate && actualDate.startsWith(`${monthKey}-`)) return [{ date: actualDate, source: 'actual' }];
            if (startDate && startDate.startsWith(`${monthKey}-`)) return [{ date: startDate, source: 'start' }];
            return [];
