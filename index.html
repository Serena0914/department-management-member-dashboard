<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品设计部任务管理-公用版</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            background: #f5f7fb;
            overflow: hidden;
        }

        body {
            font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .public-frame {
            display: block;
            width: 100vw;
            height: 100vh;
            border: 0;
            background: #f5f7fb;
        }

        .fallback {
            display: none;
            min-height: 100vh;
            padding: 40px 24px;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.08), transparent 26%),
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 28%),
                linear-gradient(180deg, #f7fbfa 0%, #eff4f3 100%);
            color: #17312a;
        }

        .fallback-card {
            width: min(560px, 100%);
            padding: 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 18px 44px rgba(25, 74, 58, 0.08);
            text-align: center;
        }

        .fallback-card h1 {
            margin: 0 0 12px;
            font-size: 26px;
        }

        .fallback-card p {
            margin: 0;
            font-size: 14px;
            line-height: 1.7;
            color: #557065;
        }

        .fallback-card a {
            color: #0f766e;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <iframe
        class="public-frame"
        src="./管理看板.html?public=department-overview"
        title="产品设计部任务管理-公用版"
        loading="eager"
        referrerpolicy="no-referrer"
        onerror="document.getElementById('fallback').style.display='flex'"
    ></iframe>

    <div class="fallback" id="fallback">
        <div class="fallback-card">
            <h1>产品设计部任务管理-公用版</h1>
            <p>公开版页面加载失败。你也可以直接打开 <a href="./管理看板.html?public=department-overview">部门概览</a>、<a href="./管理看板.html?public=department-calendar">日历看板</a> 或 <a href="./管理看板.html?public=department-weekly">工作进度追踪</a>。</p>
        </div>
    </div>
</body>
</html>
