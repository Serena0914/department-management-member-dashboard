                    subtitle: `${meta.group} / 成员明细 · 负责产品：${(meta.products || []).join(' / ') || '待补充'}`,
                    rows: getPeriodData(state.normalizedRows.filter(row => row.person === member.name))
                };
            }

            return {
                icon: '◫',
                title: '部门概览',
                subtitle: '产品设计部 · 横向查看每个产品当前阶段的版本与任务',
                rows: getPeriodData(state.normalizedRows)
            };
        }

        function cleanVersionLabel(label) {
            return label.replace(/\s+/g, ' ').replace(/-v/g, ' v').trim();
        }

        function deriveTrackLabel(row) {
            const source = [row.task, row.key_result, row.note].filter(Boolean).join(' / ');
            const patterns = [
                /(UWP[- ]?v\d+(?:\.\d+){0,2})/i,
                /(iOS\s*v\d+(?:\.\d+){0,2})/i,
                /(web\s*[- ]?v\d+(?:\.\d+){0,2})/i,
                /((?:LynxPDF|PDF Reader Pro|ComPDF AI|ComPDF|Web SDK|Server SDK|PC SDK|运营后台|会员系统|工单系统|官网)?[- ]?v\d+(?:\.\d+){0,2})/i,
                /(v\d+(?:\.\d+){0,2})/i
            ];

            for (const pattern of patterns) {
                const match = source.match(pattern);
                if (match) return cleanVersionLabel(match[1]);
            }

            if (/数据看板/.test(source)) return '数据看板';
            if (/标签/.test(source)) return '标签体系';
            if (/营收增长|增长策略|本地化/.test(source)) return '增长策略';
            if (/运营中台/.test(source)) return '运营中台';
            if (/OEM/.test(source)) return 'OEM 支撑中台';
            if (/AI\s*重写|小 APP/.test(source)) return 'AI 小应用';
            if (/官网/.test(source)) return '官网专项';

            return row.task
                .replace(/^【[^】]+】/, '')
                .replace(/完成|规划|设计|上线|复盘|外审|内审|验收|搭建/g, '')
                .trim()
                .slice(0, 18) || '其他任务';
        }

        function sortProducts(productNames) {
            return [...productNames].sort((left, right) => {
                const leftIndex = PRODUCT_ORDER.indexOf(left);
                const rightIndex = PRODUCT_ORDER.indexOf(right);
                const safeLeft = leftIndex === -1 ? PRODUCT_ORDER.length : leftIndex;
                const safeRight = rightIndex === -1 ? PRODUCT_ORDER.length : rightIndex;
                if (safeLeft !== safeRight) return safeLeft - safeRight;
                return left.localeCompare(right, 'zh-CN');
            });
        }

        function buildProductGroups(rows) {
            const products = {};

            rows.forEach(row => {
                const productName = normalizeProduct(row.product_line);
                const trackLabel = deriveTrackLabel(row);
                if (!products[productName]) products[productName] = {};
                if (!products[productName][trackLabel]) products[productName][trackLabel] = [];
                products[productName][trackLabel].push(row);
            });

            return sortProducts(Object.keys(products)).map(productName => {
                const versionMap = products[productName];
                const versions = Object.keys(versionMap)
                    .map(versionName => {
                        const rowsInVersion = versionMap[versionName];
                        const owners = [...new Set(rowsInVersion.map(row => row.person))];
                        const avgProgress = Math.round(rowsInVersion.reduce((sum, row) => sum + row.progress, 0) / rowsInVersion.length);
                        return {
                            name: versionName,
                            rows: rowsInVersion,
                            owners,
                            avgProgress,
                            completed: rowsInVersion.filter(row => row.progress >= 100 || row.status === '已完成').length,
                            isVersionLike: /v\d/i.test(versionName)
                        };
                    })
                    .sort((left, right) => {
                        if (left.isVersionLike !== right.isVersionLike) return left.isVersionLike ? -1 : 1;
                        return left.name.localeCompare(right.name, 'zh-CN');
                    });

                return {
                    name: productName,
                    rows: versions.flatMap(version => version.rows),
                    versions
                };
            });
        }

        function ensureSelectedProduct(pageId, productGroups) {
            const productNames = productGroups.map(group => group.name);
            if (!productNames.length) return '';
            if (!state.productSelection[pageId] || !productNames.includes(state.productSelection[pageId])) {
                state.productSelection[pageId] = productNames[0];
            }
            return state.productSelection[pageId];
        }

        function selectProductTab(pageId, productName) {
            state.productSelection[pageId] = productName;
            renderPage(pageId);
        }

        function changePeriodType(type) {
            state.filterPeriodType = type;
            renderPage(state.currentPage);
        }

        function changeMonth(month) {
            state.filterMonth = month;
            renderPage(state.currentPage);
        }

        function changeQuarter(quarter) {

            renderPage(state.currentPage);
        }

        function selectPeriod(type, value) {
            state.filterPeriodType = type;
            if (type === 'month') {
                state.filterMonth = value;
            } else {
                state.filterQuarter = value;
            }

        function renderFilterPanel() {
            const monthRows = state.normalizedRows.filter(row => row.period_type === 'month');
            const quarterRows = state.normalizedRows.filter(row => row.period_type === 'quarter');
            const months = [...new Set(monthRows.map(row => row.period))].sort().reverse();
            const quarters = [...new Set(quarterRows.map(row => row.period))].sort().reverse();
            const periodTabs = [
                ...quarters.map(quarter => ({ type: 'quarter', value: quarter })),
                ...months.map(month => ({ type: 'month', value: month }))
            ];

            return `
                <div class="filter-panel">
                    ${periodTabs.map(tab => {
                        const active = state.filterPeriodType === tab.type && (tab.type === 'month' ? state.filterMonth === tab.value : state.filterQuarter === tab.value);
                        return `<button class="filter-tab ${active ? 'active' : ''}" type="button" onclick="selectPeriod('${tab.type}', '${tab.value}')">${tab.value}</button>`;
                    }).join('')}
                </div>
            `;
        }

        function getAvailableMonths() {
            return [...new Set(state.normalizedRows.filter(row => row.period_type === 'month').map(row => row.period))].sort().reverse();
        }

        function ensureCalendarMonth() {
            const months = getAvailableMonths();
            if (!months.length) return '';
            if (!state.calendarMonth || !months.includes(state.calendarMonth)) {
                state.calendarMonth = months[0];
            }
            return state.calendarMonth;
        }

        function changeCalendarMonth(month) {
            state.calendarMonth = month;
            renderPage(state.currentPage);
        }

        function changeCalendarFilter(key, value) {
            state[key] = value;
            if (key === 'calendarFilterGroup' && value !== 'all') {
                const selectedMember = state.calendarFilterMember;
                const memberMeta = state.members.find(member => member.name === selectedMember);
                if (selectedMember !== 'all' && (!memberMeta || memberMeta.group !== value)) {
                    state.calendarFilterMember = 'all';
                }
            }
            renderPage(state.currentPage);
        }

        function changeCalendarMode(mode) {
            state.calendarMode = mode;
            renderPage(state.currentPage);
        }

        function parseCalendarDates(value, fallbackYear = '') {
            const text = String(value || '').replace(/\s+/g, ' ').trim();
            if (!text) return [];
            const found = [];
            const addDate = (year, month, day) => {
                const safeYear = Number(year);
                const safeMonth = Number(month);
                const safeDay = Number(day);
                if (!safeYear || safeMonth < 1 || safeMonth > 12 || safeDay < 1 || safeDay > 31) return;
                const parsed = new Date(safeYear, safeMonth - 1, safeDay);
                if (parsed.getFullYear() !== safeYear || parsed.getMonth() !== safeMonth - 1 || parsed.getDate() !== safeDay) return;
                found.push(`${safeYear}-${String(safeMonth).padStart(2, '0')}-${String(safeDay).padStart(2, '0')}`);
            };

            const fullDateRegex = /(\d{4})\s*[年./-]\s*(\d{1,2})\s*[月./-]\s*(\d{1,2})/g;
            let match = fullDateRegex.exec(text);
            while (match) {
                addDate(match[1], match[2], match[3]);
                match = fullDateRegex.exec(text);
            }

            const year = fallbackYear || String(new Date().getFullYear());
            const shortDateRegex = /(^|[^\d])(\d{1,2})\s*[月./-]\s*(\d{1,2})\s*[日号]?/g;
            match = shortDateRegex.exec(text);
            while (match) {
                addDate(year, match[2], match[3]);
                match = shortDateRegex.exec(text);
            }

            return [...new Set(found)].sort((left, right) => left.localeCompare(right, 'zh-CN'));
        }

        function getPrimaryDateKey(value, fallbackYear = '') {
            return parseCalendarDates(value, fallbackYear)[0] || '';
        }

        function compareDateKey(left, right) {
            if (!left || !right) return 0;
            const leftDate = new Date(`${left}T00:00:00`);
            const rightDate = new Date(`${right}T00:00:00`);
            return leftDate.getTime() - rightDate.getTime();
        }

        function buildDateRange(startKey, endKey, monthKey) {
            if (!startKey && !endKey) return [];
            if (!startKey) return endKey.startsWith(`${monthKey}-`) ? [endKey] : [];
            if (!endKey) return startKey.startsWith(`${monthKey}-`) ? [startKey] : [];

            let rangeStart = startKey;
            let rangeEnd = endKey;
            if (compareDateKey(rangeStart, rangeEnd) > 0) {
                rangeStart = endKey;
                rangeEnd = startKey;
            }

            const result = [];
            let cursor = new Date(`${rangeStart}T00:00:00`);
            const endDate = new Date(`${rangeEnd}T00:00:00`);
            while (cursor.getTime() <= endDate.getTime()) {
                const cursorKey = `${cursor.getFullYear()}-${String(cursor.getMonth() + 1).padStart(2, '0')}-${String(cursor.getDate()).padStart(2, '0')}`;
                if (cursorKey.startsWith(`${monthKey}-`)) result.push(cursorKey);
                cursor.setDate(cursor.getDate() + 1);
            }
            return result;
        }

        function getCalendarDateMeta(row, monthKey) {
            const fallbackYear = (row.period || monthKey || '').split('-')[0] || String(new Date().getFullYear());
            const plannedDate = getPrimaryDateKey(row.due_time, fallbackYear);
            const actualDate = getPrimaryDateKey(row.actual_delivery_time, fallbackYear);
            const startDate = getPrimaryDateKey(row.start_time, fallbackYear);

            if (state.calendarMode === 'planned') {
                return plannedDate && plannedDate.startsWith(`${monthKey}-`) ? [{ date: plannedDate, source: 'due' }] : [];
            }

            if (state.calendarMode === 'actual') {
                return actualDate && actualDate.startsWith(`${monthKey}-`) ? [{ date: actualDate, source: 'actual' }] : [];
            }

            const rangeDates = buildDateRange(startDate, plannedDate || actualDate, monthKey);
            if (rangeDates.length) {
                return rangeDates.map(date => ({ date, source: 'range' }));
            }

            if (plannedDate && plannedDate.startsWith(`${monthKey}-`)) return [{ date: plannedDate, source: 'due' }];
            if (actualDate && actualDate.startsWith(`${monthKey}-`)) return [{ date: actualDate, source: 'actual' }];
            if (startDate && startDate.startsWith(`${monthKey}-`)) return [{ date: startDate, source: 'start' }];
            return [];
        }

        function getCalendarRows(monthKey) {
            return state.normalizedRows
                .filter(row => row.period_type === 'month')
                .flatMap(row => {
                    const calendarMetaList = getCalendarDateMeta(row, monthKey);
                    if (!calendarMetaList.length) return [];
                    return calendarMetaList.map(calendarMeta => ({

        function renderCalendarBoard(rows, monthKey) {
            if (!monthKey) {
                return '<div class="sheet-table-shell"><div class="sheet-empty">暂无可用于日历展示的月份。</div></div>';
            }

            const [year, month] = monthKey.split('-').map(Number);
            const firstDay = new Date(year, month - 1, 1);
            const daysInMonth = new Date(year, month, 0).getDate();
            const startOffset = (firstDay.getDay() + 6) % 7;
            const today = new Date();
            const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
            const weekLabels = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            const grouped = rows.reduce((acc, row) => {
                const key = row.calendar_date;
                if (!acc[key]) acc[key] = [];
                acc[key].push(row);
                return acc;
            }, {});

            Object.values(grouped).forEach(items => items.sort((left, right) => {
                const leftGroup = left.group || left.team || '';
                const rightGroup = right.group || right.team || '';
                if (leftGroup !== rightGroup) return leftGroup.localeCompare(rightGroup, 'zh-CN');
                return (left.person || '').localeCompare(right.person || '', 'zh-CN');
            }));

            const cells = [];
            for (let index = 0; index < startOffset; index += 1) {
                cells.push('<div class="calendar-day-cell is-empty"></div>');
            }

            for (let day = 1; day <= daysInMonth; day += 1) {
                const dateKey = `${monthKey}-${String(day).padStart(2, '0')}`;
                const weekday = (startOffset + day - 1) % 7;
                const dayRows = grouped[dateKey] || [];
                const isWeekend = weekday >= 5;
                const classes = ['calendar-day-cell'];
                if (isWeekend) classes.push('is-weekend');
                if (dateKey === todayKey) classes.push('is-today');
                const taskMarkup = dayRows.length ? `
                    <div class="calendar-task-list">
                        ${dayRows.map(row => `
                            <div class="calendar-task-card ${(row.team || row.group) === '设计组' ? 'group-design' : 'group-project'}">

                                <div class="calendar-task-tags">
                                    <span class="calendar-tag">${escapeHtml(getCalendarProgressLabel(row))}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : '<div class="calendar-empty-note">当日暂无任务</div>';

                cells.push(`
                    <div class="${classes.join(' ')}">
                        <div class="calendar-day-head">
                            <div class="calendar-day-number">${day}</div>
                            <div class="calendar-day-meta">${weekLabels[weekday]}</div>
                        </div>
                        ${taskMarkup}
                    </div>
                `);
            }

            return `
                <div class="calendar-board">
                    <section class="calendar-shell">
                        <div class="calendar-header-row">
                            ${weekLabels.map(label => `<div class="calendar-header-cell">${label}</div>`).join('')}
                        </div>
                        <div class="calendar-grid">
                            ${cells.join('')}
                        </div>
                    </section>
                </div>
            `;
        }

        function renderInsightCards(rows, productGroups) {
            const completed = rows.filter(row => row.progress >= 100 || row.status === '已完成').length;
            const inProgress = rows.filter(row => row.status === '进行中' || (row.progress > 0 && row.progress < 100)).length;
            const pending = rows.filter(row => row.progress === 0 || row.status === '待开始').length;
            const delayedCount = rows.filter(row => {
                const fallbackYear = (row.period || '').split('-')[0] || String(new Date().getFullYear());
                const dueDate = getPrimaryDateKey(row.due_time, fallbackYear);
                const actualDate = getPrimaryDateKey(row.actual_delivery_time, fallbackYear);
                return dueDate && actualDate && compareDateKey(actualDate, dueDate) > 0;
            }).length;
            const earlyCompletedCount = rows.filter(row => {
                const fallbackYear = (row.period || '').split('-')[0] || String(new Date().getFullYear());
                const dueDate = getPrimaryDateKey(row.due_time, fallbackYear);
                const actualDate = getPrimaryDateKey(row.actual_delivery_time, fallbackYear);
                return dueDate && actualDate && compareDateKey(actualDate, dueDate) < 0;
            }).length;
            const versionCount = new Set(rows.map(row => String(row.version_no || '').trim()).filter(Boolean)).size;
            const completionRate = rows.length ? Math.round((completed / rows.length) * 100) : 0;
            const taskTypeStats = rows.reduce((acc, row) => {
                const key = row.task_type || '其他';
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
            const taskTypeNames = Object.keys(taskTypeStats);
            const topTaskType = [...taskTypeNames].sort((left, right) => taskTypeStats[right] - taskTypeStats[left])[0] || '—';
            const taskTypeList = sortByConfiguredOrder(taskTypeNames, TASK_TYPE_ORDER)
                .map(name => ({
                    name,
                    count: taskTypeStats[name],
                    ratio: rows.length ? Math.round((taskTypeStats[name] / rows.length) * 100) : 0
                }));

            const cards = [
                { label: '关键任务', value: rows.length, note: '当前周期总任务量' },
                { label: '版本号', value: versionCount, note: '按版本号字段去重后的处理中版本数' },
                { label: '完成率', value: `${completionRate}%`, note: `${completed} 项已完成` },
                { label: '进行中', value: inProgress, note: '需要持续推进的任务' },
                { label: '待开始', value: pending, note: '尚未启动或排期后置' },
                { label: '延期', value: delayedCount, note: '实际完成时间晚于规定完成时间' },
                { label: '提前完成', value: earlyCompletedCount, note: '实际完成时间早于规定完成时间' }
            ];

            const distributionMarkup = taskTypeList.length ? `
                <section class="task-type-distribution">
                    <div class="task-type-distribution-head">
                        <div>
                            <div class="task-type-distribution-title">任务类型分布</div>
                            <div class="task-type-distribution-subtitle">按当前筛选结果统计各任务类型占比，便于快速识别当前工作重心。</div>
                        </div>
                        <div class="task-type-distribution-meta">共 ${taskTypeNames.length} 类 · 最高 ${topTaskType}</div>
                    </div>
                    <div class="task-type-distribution-list">
                        ${taskTypeList.map(item => `
                            <div class="task-type-distribution-item">
                                <div class="task-type-distribution-label">${item.name}</div>
                                <div class="task-type-distribution-bar">
                                    <div class="task-type-distribution-fill" style="width: ${item.ratio}%"></div>
                                </div>
                                <div class="task-type-distribution-value">${item.count} 项 · ${item.ratio}%</div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            ` : '';

            return `<div class="insight-grid">${cards.map(card => `
                <div class="insight-card">
                    <div class="insight-eyebrow">${card.label}</div>
                    <div class="insight-value">${card.value}</div>
                    <div class="insight-note">${card.note}</div>
                </div>
            `).join('')}</div>${distributionMarkup}`;
        }

        function summarizeBoardAnalysis(rows) {
            if (!rows.length) return null;

            const completed = rows.filter(row => row.progress >= 100 || row.status === '已完成').length;
            const pending = rows.filter(row => row.progress === 0 || row.status === '待开始').length;
            const riskCount = rows.filter(row => row.isHighRisk || /高/.test(String(row.risk_level || row.risk_note || ''))).length;
            const avgProgress = Math.round(rows.reduce((sum, row) => sum + (Number.isFinite(row.progress) ? row.progress : 0), 0) / rows.length);
            const completionRate = Math.round((completed / rows.length) * 100);
            const buildRank = values => Object.entries(values).sort((left, right) => right[1] - left[1])[0] || ['—', 0];

            const ownerStats = rows.reduce((acc, row) => {
                const key = row.raw_owner || row.person || '未分配';
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
            const productStats = rows.reduce((acc, row) => {
                const key = normalizeProduct(row.product_line);
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
            const taskTypeStats = rows.reduce((acc, row) => {
                const key = row.task_type || '其他';
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});

            const [topOwner, topOwnerCount] = buildRank(ownerStats);
            const [topProduct, topProductCount] = buildRank(productStats);
            const [topTaskType, topTaskTypeCount] = buildRank(taskTypeStats);
            const delayedCount = rows.filter(row => {
                const fallbackYear = (row.period || '').split('-')[0] || String(new Date().getFullYear());
                const dueDate = getPrimaryDateKey(row.due_time, fallbackYear);
                const actualDate = getPrimaryDateKey(row.actual_delivery_time, fallbackYear);
                return dueDate && actualDate && compareDateKey(actualDate, dueDate) > 0;
            }).length;

            let momentumText = '当前推进平稳，可以继续按版本节奏清理尾项。';
            if (completionRate < 40) momentumText = '完成率偏低，当前更像任务堆积阶段，需要先拆出本周期必须闭环的关键项。';
            else if (pending >= Math.max(3, Math.ceil(rows.length * 0.28))) momentumText = '待开始项偏多，说明排期在前端已经堆积，建议尽快压缩未启动范围。';
            else if (avgProgress >= 75) momentumText = '平均进度已经进入冲刺区，适合把注意力转到收尾质量和交付节奏。';

            let riskText = riskCount
                ? `当前筛选内有 ${riskCount} 项高风险事项，需要优先确认阻塞点和资源占用。`
                : '当前没有显式高风险项，建议继续用延迟任务和待开始任务作为预警补位。';
            if (delayedCount) {
                riskText += ` 另外有 ${delayedCount} 项已经晚于规定完成时间。`;
            }

            return {
                avgProgress,
                completionRate,
                pending,
                riskCount,
                topOwner,
                topOwnerCount,
                topProduct,
                topProductCount,
                topTaskType,
                topTaskTypeCount,
                momentumText,
                riskText
            };
        }

        function getInfoSourceSummaryLabel() {
            const period = getCurrentPeriod();
            if (!period) return '当前默认周期';
            return `${state.filterPeriodType === 'month' ? '月度' : '季度'} ${period}`;
        }

        async function loadInfoSourceData() {
            const periodType = state.filterPeriodType;
            const period = getCurrentPeriod();
            const summaryLabel = getInfoSourceSummaryLabel();
            const statusNode = document.getElementById('infoSourceStatus');
            if (statusNode) statusNode.textContent = `正在刷新${summaryLabel}导入汇总…`;
            const response = await fetch(`${APP_ORIGIN}/api/admin?period_type=${periodType}&period=${period}`);
            const payload = await response.json();
            state.infoSource.admin = payload;
            renderInfoSourceMetrics(payload);
            renderInfoSourceSummary(payload);
            if (statusNode) statusNode.textContent = `已刷新${summaryLabel}导入分析。当前仅保留导入与看板分析，不再提供成员直填入口。`;
        }

        function renderInfoSourceMetrics(payload) {
            const submissions = payload.submissions || [];
            const dailyTasks = payload.daily_tasks || [];
            const filledMembers = new Set(submissions.map(item => item.member));
            const versions = new Set();
            submissions.forEach(item => (item.tasks || []).forEach(task => task.version_or_track && versions.add(task.version_or_track)));
            const totalHours = dailyTasks.reduce((sum, item) => sum + Number(item.daily_hours || 0), 0).toFixed(1);
            const metricsNode = document.getElementById('infoSourceMetrics');
            if (!metricsNode) return;
            metricsNode.innerHTML = [
                { label: '已导入成员', value: filledMembers.size, desc: `覆盖 ${state.members.length} 人` },
                { label: '导入份数', value: submissions.length, desc: '当前周期已入库记录' },
                { label: '版本 / 专项', value: versions.size, desc: '本周期推进中的版本数量' },
                { label: '日任务工时', value: totalHours, desc: '自动生成的总日工时' }
            ].map(item => `
                <div class="info-source-metric">
                    <div class="info-source-metric-label">${item.label}</div>
                    <div class="info-source-metric-value">${item.value}</div>
                    <div class="info-source-metric-desc">${item.desc}</div>
                </div>
            `).join('');
        }

        function renderInfoSourceSummary(payload = state.infoSource.admin || {}) {
            const container = document.getElementById('infoSourceSummaryList');
            if (!container) return;
            const submissions = payload.submissions || [];
            const updatedAt = payload.updated_at || '';
            const groups = ['专案组', '设计组'];
            const filledMembers = new Set(submissions.map(item => item.member));
            const coverageMarkup = groups.map(groupName => {
                const members = state.members.filter(member => member.group === groupName);
                if (!members.length) return '';
                return `
                    <div class="info-source-summary-card">
                        <div class="info-source-summary-card-head">
                            <div>
                                <div class="info-source-group-title">${groupName}</div>
                                <div class="info-source-group-meta">${members.length} 人</div>
                            </div>
                        </div>
                        <div class="info-source-summary-card-body">
                            <div class="info-source-pill-row">
                                ${members.map(member => `
                                    <span class="info-source-pill">${member.name}${filledMembers.has(member.name) ? ' · 已入库' : ' · 待导入'}</span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            container.innerHTML = `
                <div class="info-source-summary-card">
                    <div class="info-source-summary-card-head">
                        <div>
                            <div class="info-source-panel-title">当前模式</div>
                            <h3>仅保留导入与分析链路</h3>
                        </div>
                    </div>
                    <div class="info-source-summary-card-body">
                        <div class="info-source-pill-row">
                            <span class="info-source-pill">成员不再通过链接直填</span>
                            <span class="info-source-pill">管理员统一导入月度数据</span>
                            <span class="info-source-pill">看板继续基于 SQLite 做分析</span>
                        </div>
                    </div>
                </div>
                <div class="info-source-summary-card">
                    <div class="info-source-summary-card-head">
                        <div>
                            <div class="info-source-panel-title">推荐数据源</div>
                            <h3>优先维护月度 OKR 单一主源</h3>
                        </div>
                    </div>
                    <div class="info-source-summary-card-body">
                        <div class="info-source-pill-row">
                            <span class="info-source-pill">月度 OKR Google Sheet</span>
                            <span class="info-source-pill">本地 month_okr 导出</span>
                            <span class="info-source-pill">月度导入脚本</span>
                            <span class="info-source-pill">SQLite 历史提交库</span>
                        </div>
                    </div>
                </div>
                <div class="info-source-summary-card">
                    <div class="info-source-summary-card-head">
                        <div>
                            <div class="info-source-panel-title">最近汇总状态</div>
                            <h3>${updatedAt ? `最近汇总时间 ${String(updatedAt).replace('T', ' ')}` : '当前页正在读取 SQLite 汇总'}</h3>
                        </div>
                    </div>
                    <div class="info-source-summary-card-body">
                        <div class="info-source-pill-row">
                            <span class="info-source-pill">数据来源：admin 汇总接口</span>
                            <span class="info-source-pill">持久层：SQLite submissions.db</span>
                            <span class="info-source-pill">当前页只读，不提供成员写入口</span>
                        </div>
                    </div>
                </div>
                ${coverageMarkup}
            `;
        }

        function getInfoSourceWorkflowConfig() {
            return [
                {
                    kicker: 'Source Flow',
                    title: '月度导入主链路',
                    desc: '适合日常维护部门 OKR。先更新月度 OKR Sheet，再通过现有导入脚本写入 SQLite，最后回管理中枢看结果。',
                    steps: [
                        {
                            text: '更新本地源文件：优先检查 month_okr 导出是否已同步到当前周期，部门 OKR 的主源只认这份月度表。'
                        },
                        {
                            text: '按成员执行导入脚本，把清洗后的周期任务写入 SQLite。当前李鑫的导入入口已经沉淀为 tmp_import_lixin_okr_2026.py。',
                            code: '/Users/kdan/Documents/github/kdan/.venv/bin/python tmp_import_lixin_okr_2026.py'
                        },
                        {
                            text: '回到管理中枢刷新当前汇总页面，确认当前周期的导入份数、已导入成员和版本数量是否符合预期。'
                        }
                    ]
                },
                {
                    kicker: 'Display Refresh',
                    title: '月度 OKR 展示页刷新',
                    desc: '当月度 OKR 导入结果更新后，这里只需要重载展示页和核对当前周期，不再要求先跑 Redmine 缓存链路。',
                    steps: [
                        {
                            text: '先确认本期月度 OKR 导入已经完成，SQLite 中已有最新成员任务。'
                        },
                        {
                            text: '回到左侧“OKR看板展示”页，点击“重载展示区”或直接刷新页面，让展示容器重新读取最新内容。'
                        },
                        {
                            text: '核对当前周期、成员行和 KR 列表是否与本次月度表更新保持一致。'
                        }
                    ]
                },
                {
                    kicker: 'Validation',
                    title: '导入后的快速校验',
                    desc: '不要只看单页渲染。每次改底层数据或导入结果后，至少做一次汇总级检查，避免成员、版本和工时三类指标脱钩。',
                    steps: [
                        {
                            text: '核对“已导入成员 / 导入份数 / 版本专项 / 日任务工时”四个指标是否同时变化。'
                        },
                        {
                            text: '切换到专案组概览、设计组概览和个人明细页，确认本周期任务已联动更新。'
                        },
                        {
                            text: '如指标异常，优先回查 SQLite 入库结果和导入脚本输出，而不是直接改前端展示。'
                        }
                    ]
                },
                {
                    kicker: 'Canonical Files',
                    title: '当前应优先维护的文件',
                    desc: '这几个文件决定了导入分析模式的日常维护成本。后续新增脚本或数据源，建议沿着这套入口继续收敛。',
                    noteList: [
                        'build_dashboard_data.js：统一负责把月度主源转换成静态看板数据。',
                        '产品设计部管理看板.html：统一承接主看板展示与浏览说明。',
                        'OKR管理看板.html：当前展示容器，后续需要切换到底层月度 OKR 取数。',
                        'tmp_import_lixin_okr_2026.py：当前已验证可写入 SQLite 的月度导入入口。'
                    ]
                }
            ];
        }

        function renderInfoSourceWorkflow() {
            const container = document.getElementById('infoSourceWorkflow');
            if (!container) return;
            const cards = getInfoSourceWorkflowConfig();
            container.innerHTML = cards.map(card => {
                const stepsMarkup = Array.isArray(card.steps) ? `
                    <div class="info-source-step-list">
                        ${card.steps.map((step, index) => `
                            <div class="info-source-step-item">
                                <span class="info-source-step-no">${index + 1}</span>
                                <div class="info-source-step-text">
                                    <div>${step.text}</div>
                                    ${step.code ? `<span class="info-source-code">${step.code}</span>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : '';
                const noteMarkup = Array.isArray(card.noteList) ? `
                    <div class="info-source-note-box">
                        <div class="info-source-note-title">维护优先级</div>
                        <div class="info-source-mini-list">
                            ${card.noteList.map(item => `<div>${item}</div>`).join('')}
                        </div>
                    </div>
                ` : '';
                return `
                    <section class="info-source-workflow-card">
                        <div class="info-source-workflow-head">
                            <div class="info-source-workflow-kicker">${card.kicker}</div>
                            <h4>${card.title}</h4>
                            <div class="info-source-workflow-desc">${card.desc}</div>
                        </div>
                        ${stepsMarkup}
                        ${noteMarkup}
                    </section>
                `;
            }).join('');
        }

        function renderInfoSourcePage() {
            return `
                <div class="hero">
                    <div>
                        <h2>数据导入与管理看板分析</h2>
                        <p>当前系统已经切换为“仅导入 + 分析”模式。成员不再进入系统填报，所有周期数据由管理员通过本地数据源、脚本或数据库统一沉淀，再由管理中枢完成汇总与判断。</p>
                    </div>
                    <div class="hero-stats">
                        <div class="hero-stat">
                            <span class="hero-stat-value">${state.members.length}</span>
                            <span class="hero-stat-label">成员</span>
                        </div>
                        <div class="hero-stat">
                            <span class="hero-stat-value">导入制</span>
                            <span class="hero-stat-label">数据模式</span>
                        </div>
                    </div>
                </div>
                <section class="info-source-metrics" id="infoSourceMetrics"></section>
                <div class="info-source-grid">
                    <section class="info-source-panel">
                        <div class="info-source-panel-head">
                            <div class="info-source-panel-title">导入说明</div>
                            <h3>当前数据覆盖与导入方式</h3>
                        </div>
                        <div class="info-source-panel-body info-source-stack">
                            <div class="info-source-toolbar">
                                <button class="btn" onclick="refreshInfoSourcePage()">刷新管理分析</button>
                                <div class="info-source-status" id="infoSourceStatus">准备加载导入状态…</div>
                            </div>
                            <div class="info-source-summary-list" id="infoSourceSummaryList"></div>
                        </div>
                    </section>
                    <section class="info-source-panel">
                        <div class="info-source-panel-head">
                            <div class="info-source-panel-title">导入工作台</div>
                            <h3>固定操作流程与维护入口</h3>
                        </div>
                        <div class="info-source-panel-body info-source-stack">
                            <div class="info-source-status">下面这些步骤对应当前仓库已经存在的脚本和数据文件，可直接作为日常维护 SOP 使用。</div>
                            <div class="info-source-workflow-grid" id="infoSourceWorkflow"></div>
                        </div>
                    </section>
                </div>
                <div class="info-source-toast" id="infoSourceToast" aria-live="polite"></div>
            `;
        }

        function showInfoSourceToast(message) {
            const toast = document.getElementById('infoSourceToast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('is-visible');
            if (state.toastTimer) {
                clearTimeout(state.toastTimer);
            }
            state.toastTimer = window.setTimeout(() => {
                toast.classList.remove('is-visible');
            }, 1800);
        }

        async function refreshInfoSourcePage() {
            await loadInfoSourceData();
        }

        window.refreshInfoSourcePage = refreshInfoSourcePage;

        function renderPage(pageId) {
            const container = document.getElementById('page-container');
            const normalized = normalizePageId(pageId);
            if (normalized === 'okr-board') {
                container.innerHTML = renderOkrBoardPage();
                return;
            }
            if (normalized === 'info-source') {
                container.innerHTML = renderInfoSourcePage();
                renderInfoSourceWorkflow();
                loadInfoSourceData().catch(() => {
                    const statusNode = document.getElementById('infoSourceStatus');
                    if (statusNode) statusNode.textContent = '加载导入汇总失败，请稍后重试。';
                    showInfoSourceToast('导入汇总加载失败，请确认 9020 服务已启动');
                });
                return;
            }
            if (normalized === 'department-calendar') {
                const calendarMonth = ensureCalendarMonth();
                const monthRows = getCalendarRows(calendarMonth);
                const filteredRows = applyCalendarFilters(monthRows);
                container.innerHTML = `
                    <div class="filter-panel calendar-month-panel">
                        ${getAvailableMonths().map(month => `<button class="calendar-month-chip ${calendarMonth === month ? 'active' : ''}" type="button" onclick="changeCalendarMonth('${month}')">${month}</button>`).join('')}
                    </div>
                    <div class="scope-header">
                        <div class="scope-title-wrap">
                            <div class="scope-icon">▦</div>
                            <div>
                                <div class="scope-title">日历看板</div>
                                <div class="scope-subtitle">部门看板 / 按天查看任务落点，支持按月份、小组、成员切换</div>
                            </div>
                        </div>
                        ${renderCalendarFilters(monthRows)}
                    </div>
                    ${renderCalendarBoard(filteredRows, calendarMonth)}
                    ${renderBoardAnalysisModule('日历看板分析', '围绕当前月份和筛选条件，快速判断任务密度、责任压力和延期风险。', filteredRows, formatCalendarMonthLabel(calendarMonth))}
                `;
                return;
            }
            const period = getCurrentPeriod();
            const scope = getScopeConfig(normalized);
            const productGroups = buildProductGroups(scope.rows);

            if (normalized === 'department-overview') {
                const filteredRows = applyDepartmentFilters(scope.rows);
                const filteredGroups = buildProductGroups(filteredRows);
                container.innerHTML = `
                    ${renderPublicPageNote()}
                    ${renderFilterPanel()}
                    <div class="scope-header">
                        <div class="scope-title-wrap">
                            <div class="scope-icon">${scope.icon}</div>
                            <div>
                                <div class="scope-title">${scope.title}</div>
                                <div class="scope-subtitle">${scope.subtitle} · 周期 ${period}</div>
                            </div>
                        </div>
                        ${renderDepartmentFilters(scope.rows)}
                    </div>
                    ${renderInsightCards(filteredRows, filteredGroups)}
                    ${renderMonthlyFieldTable(filteredRows)}
                    ${isPublicSinglePageMode() ? renderPublicMemberSummary(filteredRows, period) : renderBoardAnalysisModule('部门看板分析', '把当前部门视角的任务状态翻译成可执行的管理判断，不用只盯表格。', filteredRows, period)}
                `;
                return;
            }

            if (normalized === 'zalist-overview' || normalized === 'design-overview') {
                const filteredRows = applyGroupFilters(scope.rows);
                const filteredGroups = buildProductGroups(filteredRows);
                container.innerHTML = `
                    ${renderFilterPanel()}
                    <div class="scope-header">
                        <div class="scope-title-wrap">
                            <div class="scope-icon">${scope.icon}</div>
                            <div>
                                <div class="scope-title">${scope.title}</div>
                                <div class="scope-subtitle">${scope.subtitle} · 周期 ${period}</div>
                            </div>
                        </div>
                        ${renderGroupFilters(scope.rows)}
                    </div>
                    ${renderInsightCards(filteredRows, filteredGroups)}
                    ${renderMonthlyFieldTable(filteredRows)}
                    ${renderBoardAnalysisModule(`${scope.title}分析`, '针对当前小组筛选结果补充工作重心、负载压力和建议动作。', filteredRows, period)}
                `;
                return;
            }

            if (normalized.startsWith('person-')) {
                const filteredRows = applyPersonFilters(scope.rows);
                const filteredGroups = buildProductGroups(filteredRows);
                container.innerHTML = `
                    ${renderFilterPanel()}
                    <div class="scope-header">
                        <div class="scope-title-wrap">
                            <div class="scope-icon">${scope.icon}</div>
                            <div>
                                <div class="scope-title">${scope.title}</div>
                                <div class="scope-subtitle">${scope.subtitle} · 周期 ${period}</div>
                            </div>
                        </div>
                        ${renderPersonFilters(scope.rows)}
                    </div>
                    ${renderInsightCards(filteredRows, filteredGroups)}
                    ${renderMonthlyFieldTable(filteredRows)}
                    ${renderBoardAnalysisModule(`${scope.title}分析`, '成员页除了字段清单，再补一层个人任务结构和管理判断。', filteredRows, period)}
                `;
                return;
            }

            container.innerHTML = `
                ${renderFilterPanel()}
                <div class="scope-header">
                    <div class="scope-title-wrap">
                        <div class="scope-icon">${scope.icon}</div>
                        <div>
                            <div class="scope-title">${scope.title}</div>
                            <div class="scope-subtitle">${scope.subtitle} · 周期 ${period}</div>
                        </div>
                    </div>
                </div>
                ${renderInsightCards(scope.rows, productGroups)}
                ${renderMonthlyFieldTable(scope.rows)}
                ${renderBoardAnalysisModule(`${scope.title}分析`, '在表格底下补上对当前看板的结论、风险和建议动作。', scope.rows, period)}
            `;
        }

        window.addEventListener('DOMContentLoaded', initData);
    </script>
</body>
</html>
